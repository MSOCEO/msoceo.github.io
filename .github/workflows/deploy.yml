name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy DJ Portal
        run: |
          cp -r public/dj dist/
          cp public/dj/index.html dist/dj.html
          cp -r public/marvis-dj dist/

      - name: Copy startrails
        run: cp -r startrails dist/

      - name: Build agent-hub (static)
        working-directory: ./agent-hub
        run: mkdir -p dist && cp -r static/* dist/

      - name: Copy agent-hub to dist
        run: mkdir -p dist/agent-hub && cp -r agent-hub/dist/* dist/agent-hub/

      - name: Copy workbox to dist
        run: cp -r workbox dist/

      - name: Copy portal to dist root
        run: cp portal.html dist/index.html

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Verify dist artifacts
        run: |
          echo "workbox size: $(wc -c < dist/workbox/index.html)"
          echo "portal size: $(wc -c < dist/index.html)"
          echo "dj size: $(wc -c < dist/dj/index.html)"
          echo "dj.html size: $(wc -c < dist/dj.html)"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
