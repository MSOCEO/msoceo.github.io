name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Copy startrails
        run: cp -r startrails dist/
      - name: Build agent-hub (static)
        working-directory: ./agent-hub
        run: mkdir -p dist && cp -r static/* dist/
      - name: Copy agent-hub to dist
        run: mkdir -p dist/agent-hub && cp -r agent-hub/dist/* dist/agent-hub/
      - name: List dist structure (diagnostic)
        run: |
          echo "=== Root files ==="
          ls -la dist/
          echo "=== blog/index.html head ==="
          head -c 200 dist/blog/index.html
          echo ""
          echo "=== archive/index.html head ==="
          head -c 200 dist/archive/index.html 2>/dev/null || echo "(not found)"
          echo "=== Navigation link check ==="
          grep -c 'href="/archive"' dist/blog/index.html && echo "✓ /archive link found" || echo "✗ /archive link NOT found"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5