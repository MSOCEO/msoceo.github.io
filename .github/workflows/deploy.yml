name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy startrails
        run: cp -r startrails dist/

      - name: Build agent-hub (static)
        working-directory: ./agent-hub
        run: mkdir -p dist && cp -r static/* dist/

      - name: Copy agent-hub to dist
        run: mkdir -p dist/agent-hub && cp -r agent-hub/dist/* dist/agent-hub/

      - name: Copy workbox to dist
        run: cp -r workbox dist/

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: List dist structure
        run: |
          echo "=== Dist root ==="
          ls -la dist/
          echo "=== Dist/blog ==="
          ls dist/blog/ | head -20
          echo "=== Dist/blog/index.html preview ==="
          head -c 200 dist/blog/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
