name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy startrails
        run: cp -r startrails dist/

      - name: Build agent-hub (static)
        working-directory: ./agent-hub
        run: mkdir -p dist && cp -r static/* dist/

      - name: Copy agent-hub to dist
        run: mkdir -p dist/agent-hub && cp -r agent-hub/dist/* dist/agent-hub/

      - name: Copy workbox to dist
        run: cp -r workbox dist/

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          # No custom domain - using default github.io

      - name: Configure Pages source to gh-pages branch
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/MSOCEO/msoceo.github.io/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}'
