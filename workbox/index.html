<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即刻办公 — 一站式在线工具箱</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'SF Pro Display',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  background:#0a0a0f;
  color:#e1e2e9;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

/* ===== Decorative BG ===== */
.bg-grid{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 10%,rgba(99,102,241,.06) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%,rgba(139,92,246,.05) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(6,182,212,.03) 0%,transparent 60%);
}
.bg-grid::after{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,black 30%,transparent 70%);
}

/* ===== Outer Frame ===== */
.outer-frame{
  position:relative;z-index:1;
  max-width:100%;
  margin:0;
  padding:0;
}
.outer-frame::before{
  content:'';position:absolute;inset:0;
  border:1px solid rgba(99,102,241,.12);
  border-radius:0;
  pointer-events:none;
}
@media(min-width:1200px){
  .outer-frame{margin:16px;border-radius:16px;overflow:hidden}
  .outer-frame::before{border-radius:16px;inset:0}
}

/* ===== Header ===== */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,15,.85);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:0 24px;height:64px;
  display:flex;align-items:center;gap:24px;
}
.header-brand{
  display:flex;align-items:center;gap:10px;
  font-size:1.125rem;font-weight:700;letter-spacing:-.02em;
  color:#e1e2e9;white-space:nowrap;
  text-decoration:none;
}
.header-brand .logo{
  width:34px;height:34px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;color:#fff;font-weight:800;
}
.header-tagline{
  font-size:.75rem;color:rgba(255,255,255,.35);
  margin-left:-14px;white-space:nowrap;
  display:none;
}
@media(min-width:768px){.header-tagline{display:block}}

.search-wrap{
  flex:1;max-width:480px;position:relative;
}
.search-wrap input{
  width:100%;height:40px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:0 16px 0 40px;
  font-size:.875rem;color:#e1e2e9;
  outline:none;transition:all .2s ease;
}
.search-wrap input:focus{
  border-color:rgba(99,102,241,.4);
  background:rgba(255,255,255,.06);
  box-shadow:0 0 0 3px rgba(99,102,241,.1);
}
.search-wrap input::placeholder{color:rgba(255,255,255,.25)}
.search-wrap .search-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:rgba(255,255,255,.25);font-size:.875rem;pointer-events:none;
}
.search-clear{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;
  font-size:1rem;display:none;padding:4px;border-radius:50%;
}
.search-clear:hover{color:rgba(255,255,255,.6);background:rgba(255,255,255,.06)}
.search-clear.visible{display:flex;align-items:center;justify-content:center}

/* ===== Layout ===== */
.app-layout{
  display:flex;position:relative;z-index:1;min-height:calc(100vh - 64px);
}

/* ===== Sidebar ===== */
.sidebar{
  width:220px;flex-shrink:0;
  background:rgba(10,10,15,.6);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-right:1px solid rgba(255,255,255,.05);
  padding:20px 12px;
  overflow-y:auto;position:sticky;top:64px;
  max-height:calc(100vh - 64px);
  transition:transform .3s ease;
}
.sidebar-title{
  font-size:.7rem;text-transform:uppercase;
  letter-spacing:.1em;color:rgba(255,255,255,.2);
  padding:0 12px 12px;
}
.sidebar-nav{list-style:none;display:flex;flex-direction:column;gap:2px}
.sidebar-nav li a{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  font-size:.85rem;color:rgba(255,255,255,.5);
  text-decoration:none;transition:all .2s ease;
  cursor:pointer;
}
.sidebar-nav li a:hover{color:#e1e2e9;background:rgba(255,255,255,.04)}
.sidebar-nav li a.active{
  color:#e1e2e9;background:rgba(99,102,241,.12);
  font-weight:600;
}
.sidebar-nav li a .nav-dot{
  width:6px;height:6px;border-radius:50%;
  background:currentColor;opacity:0;
  transition:opacity .2s;
}
.sidebar-nav li a.active .nav-dot{opacity:1;background:#6366f1}
.sidebar-count{
  margin-left:auto;font-size:.7rem;
  background:rgba(255,255,255,.04);
  padding:2px 7px;border-radius:6px;
}

/* Mobile sidebar toggle */
.mobile-nav-toggle{
  display:none;
  position:fixed;bottom:24px;right:24px;z-index:200;
  width:48px;height:48px;border-radius:50%;
  background:rgba(99,102,241,.9);border:none;cursor:pointer;
  color:#fff;font-size:1.25rem;
  box-shadow:0 4px 20px rgba(99,102,241,.4);
  backdrop-filter:blur(10px);
  align-items:center;justify-content:center;
}
@media(max-width:900px){
  .sidebar{
    position:fixed;left:0;top:64px;bottom:0;z-index:150;
    transform:translateX(-100%);
    box-shadow:4px 0 30px rgba(0,0,0,.5);
  }
  .sidebar.open{transform:translateX(0)}
  .mobile-nav-toggle{display:flex}
}

/* ===== Main content ===== */
.main-content{
  flex:1;padding:32px 24px 64px;overflow-y:auto;
  max-width:1400px;
}

/* Category section */
.category-section{margin-bottom:48px}
.category-header{
  display:flex;align-items:center;gap:14px;margin-bottom:24px;
}
.category-icon{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;
  background:rgba(99,102,241,.1);
  flex-shrink:0;
}
.category-header h2{
  font-size:1.35rem;font-weight:700;letter-spacing:-.02em;
  color:#e1e2e9;
}
.category-header .count{
  font-size:.75rem;color:rgba(255,255,255,.25);
  background:rgba(255,255,255,.04);
  padding:3px 10px;border-radius:8px;
}

/* Tool grid */
.tool-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:12px;
}

/* Tool card */
.tool-card{
  position:relative;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  padding:20px;
  cursor:pointer;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.tool-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 100% 100% at 50% -20%,rgba(99,102,241,.08),transparent 70%);
  opacity:0;transition:opacity .3s;
}
.tool-card:hover{
  background:rgba(255,255,255,.04);
  border-color:rgba(99,102,241,.2);
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(0,0,0,.3),0 0 0 1px rgba(99,102,241,.1) inset;
}
.tool-card:hover::before{opacity:1}
.tool-card:active{transform:translateY(0);transition:transform .1s}

.tool-card-badge{
  position:absolute;top:12px;right:12px;
  font-size:.6rem;font-weight:700;text-transform:uppercase;
  padding:3px 8px;border-radius:6px;letter-spacing:.05em;
}
.badge-ai{background:rgba(6,182,212,.15);color:#06b6d4}
.badge-hot{background:rgba(139,92,246,.15);color:#a78bfa}
.badge-new{background:rgba(99,102,241,.15);color:#818cf8}

.tool-card-icon{
  width:42px;height:42px;border-radius:12px;
  background:rgba(99,102,241,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:1.15rem;margin-bottom:14px;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
}
.tool-card:hover .tool-card-icon{transform:scale(1.08)}
.tool-card h3{
  font-size:.95rem;font-weight:600;color:#e1e2e9;
  margin-bottom:6px;letter-spacing:-.01em;
}
.tool-card p{
  font-size:.8rem;color:rgba(255,255,255,.35);
  line-height:1.5;
}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s ease;
  padding:24px;
}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{
  width:100%;max-width:520px;
  background:rgba(20,20,28,.95);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:32px;
  transform:translateY(12px) scale(.97);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px}
.modal-icon{
  width:56px;height:56px;border-radius:16px;
  background:rgba(99,102,241,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;flex-shrink:0;
}
.modal-header h3{font-size:1.25rem;font-weight:700;margin-bottom:4px}
.modal-header .sub{font-size:.8rem;color:rgba(255,255,255,.35)}
.modal-body p{font-size:.9rem;color:rgba(255,255,255,.5);line-height:1.7;margin-bottom:20px}
.modal-formats{
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;
}
.modal-formats span{
  font-size:.7rem;padding:4px 10px;border-radius:6px;
  background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.4);
  border:1px solid rgba(255,255,255,.06);
}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.modal-actions button{
  padding:10px 22px;border-radius:10px;font-size:.85rem;
  border:none;cursor:pointer;font-weight:600;
  transition:all .2s ease;
}
.btn-close{background:rgba(255,255,255,.06);color:#e1e2e9}
.btn-close:hover{background:rgba(255,255,255,.12)}
.btn-go{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.3);
}
.btn-go:hover{box-shadow:0 6px 20px rgba(99,102,241,.45);transform:translateY(-1px)}

/* ===== Footer ===== */
.footer{
  border-top:1px solid rgba(255,255,255,.05);
  background:rgba(10,10,15,.6);
  backdrop-filter:blur(12px);
  padding:40px 24px 32px;
}
.footer-inner{
  max-width:1400px;margin:0 auto;
  display:flex;flex-wrap:wrap;gap:40px;
  justify-content:space-between;
}
.footer-brand h4{font-size:1rem;font-weight:700;margin-bottom:8px}
.footer-brand p{font-size:.8rem;color:rgba(255,255,255,.3);max-width:280px;line-height:1.6}
.footer-links{display:flex;flex-wrap:wrap;gap:48px}
.footer-col h5{
  font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;
  color:rgba(255,255,255,.2);margin-bottom:14px;
}
.footer-col a{
  display:block;font-size:.82rem;color:rgba(255,255,255,.35);
  text-decoration:none;margin-bottom:8px;transition:color .2s;
}
.footer-col a:hover{color:#818cf8}
.footer-bottom{
  max-width:1400px;margin:24px auto 0;padding-top:20px;
  border-top:1px solid rgba(255,255,255,.04);
  display:flex;flex-wrap:wrap;gap:12px;justify-content:space-between;
  font-size:.75rem;color:rgba(255,255,255,.18);
}

/* ===== Responsive ===== */
@media(max-width:1200px){
  .tool-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
}
@media(max-width:900px){
  .tool-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
  .main-content{padding:20px 16px 48px}
  .header{padding:0 16px}
}
@media(max-width:600px){
  .tool-grid{grid-template-columns:1fr 1fr;gap:8px}
  .tool-card{padding:14px}
  .tool-card h3{font-size:.85rem}
  .search-wrap{max-width:200px}
  .header-brand{font-size:.95rem}
  .modal{padding:24px}
}

/* ===== No results ===== */
.no-results{
  text-align:center;padding:60px 20px;
  color:rgba(255,255,255,.2);
}
.no-results .icon{font-size:3rem;margin-bottom:16px}
.no-results p{font-size:.9rem}

/* ===== Animations ===== */
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>

const tools = [

// Category definitions
const categories = [
  {id:'all',name:'全部工具',icon:'🏠'},
  {id:'pdf',name:'PDF 工具',icon:'📄'},
  {id:'convert',name:'格式转换',icon:'🔄'},
  {id:'video',name:'视频工具',icon:'🎬'},
  {id:'audio',name:'音频工具',icon:'🎵'},
  {id:'image',name:'图片处理',icon:'🖼️'},

  {id:'office',name:'在线 Office',icon:'💼'},
];

// Build sidebar
const sidebarNav = document.getElementById('sidebarNav');
categories.forEach(cat => {
  const count = cat.id === 'all' ? tools.length : tools.filter(t => t.cat === cat.id).length;
  if (cat.id !== 'all') {
    const li = document.createElement('li');
    li.innerHTML = `<a data-cat="${cat.id}">${cat.icon} ${cat.name}<span class="sidebar-count">${count}</span></a>`;
    sidebarNav.appendChild(li);
  }
});

// Render tools
let currentCategory = 'all';
let searchQuery = '';

function renderTools(){
  const main = document.getElementById('mainContent');
  const noResults = document.getElementById('noResults');
  
  let filtered = tools.filter(t => {
    const matchCat = currentCategory === 'all' || t.cat === currentCategory;
    const matchSearch = !searchQuery || 
      t.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
      t.desc.toLowerCase().includes(searchQuery.toLowerCase()) ||
      t.ref.toLowerCase().includes(searchQuery.toLowerCase());
    return matchCat && matchSearch;
  });

  // Remove category sections
  const existingSections = main.querySelectorAll('.category-section');
  existingSections.forEach(s => s.remove());

  if (filtered.length === 0) {
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  if (currentCategory === 'all') {
    // Group by category
    categories.filter(c => c.id !== 'all').forEach(cat => {
      const catTools = filtered.filter(t => t.cat === cat.id);
      if (catTools.length === 0) return;
      
      const section = document.createElement('div');
      section.className = 'category-section';
      section.id = 'cat-' + cat.id;
      section.innerHTML = `
        <div class="category-header">
          <div class="category-icon">${cat.icon}</div>
          <h2>${cat.name}</h2>
          <span class="count">${catTools.length} 个工具</span>
        </div>
        <div class="tool-grid">
          ${catTools.map(t => renderToolCard(t)).join('')}
        </div>
      `;
      main.appendChild(section);
    });
  } else {
    // Single category
    const cat = categories.find(c => c.id === currentCategory);
    const section = document.createElement('div');
    section.className = 'category-section';
    section.innerHTML = `
      <div class="category-header">
        <div class="category-icon">${cat?.icon || ''}</div>
        <h2>${cat?.name || ''}</h2>
        <span class="count">${filtered.length} 个工具</span>
      </div>
      <div class="tool-grid">
        ${filtered.map(t => renderToolCard(t)).join('')}
      </div>
    `;
    main.appendChild(section);
  }
}

function renderToolCard(t){
  const badge = t.badge ? `<span class="tool-card-badge badge-${t.badge}">${t.badge === 'ai' ? 'AI' : t.badge === 'hot' ? '热门' : '新品'}</span>` : '';
  return `
    <div class="tool-card" onclick="openTool('${t.id}')" data-id="${t.id}">
      ${badge}
      <div class="tool-card-icon">${t.icon}</div>
      <h3>${t.name}</h3>
      <p>${t.desc}</p>
    </div>
  `;
}

// ===== Modal =====
function openTool(id){
  const t = tools.find(x => x.id === id);
  if (!t) return;
  
  const cat = categories.find(c => c.id === t.cat);
  document.getElementById('modalIcon').textContent = t.icon;
  document.getElementById('modalTitle').textContent = t.name;
  document.getElementById('modalCat').textContent = (cat?.name || '') + '  ·  参考：' + t.ref;
  document.getElementById('modalDesc').textContent = t.desc;
  
  const formatsEl = document.getElementById('modalFormats');
  formatsEl.innerHTML = t.formats.map(f => `<span>${f}</span>`).join('');
  
  document.getElementById('modalGoBtn').onclick = () => {
    closeModal();
    // Scroll to category
    const el = document.getElementById('cat-' + t.cat);
    if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
  };
  
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') closeModal();
});

// ===== Search =====
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

searchInput.addEventListener('input', function(){
  searchQuery = this.value.trim();
  searchClear.classList.toggle('visible', searchQuery.length > 0);
  renderTools();
});

searchClear.addEventListener('click', function(){
  searchInput.value = '';
  searchQuery = '';
  searchClear.classList.remove('visible');
  renderTools();
  searchInput.focus();
});

// ===== Sidebar navigation =====
sidebarNav.addEventListener('click', function(e){
  const a = e.target.closest('a[data-cat]');
  if (!a) return;
  
  const cat = a.dataset.cat;
  currentCategory = cat;
  
  document.querySelectorAll('.sidebar-nav a').forEach(link => link.classList.remove('active'));
  a.classList.add('active');
  
  renderTools();
  
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
});

// Mobile nav toggle
document.getElementById('mobileNavToggle').addEventListener('click', function(){
  document.getElementById('sidebar').classList.toggle('open');
});

// Close mobile sidebar on outside click
document.addEventListener('click', function(e){
  const sidebar = document.getElementById('sidebar');
  const toggle = document.getElementById('mobileNavToggle');
  if (!sidebar.contains(e.target) && e.target !== toggle && !toggle.contains(e.target)){
    sidebar.classList.remove('open');
  }
});

// Initial render
renderTools();
</script>
