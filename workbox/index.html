<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即刻办公 — 一站式在线工具箱</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'SF Pro Display',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a0f;color:#e1e2e9;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(99,102,241,.06) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(139,92,246,.05) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 50% 50%,rgba(6,182,212,.03) 0%,transparent 60%)}
.bg-grid::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,black 30%,transparent 70%)}
.outer-frame{position:relative;z-index:1;max-width:100%}@media(min-width:1200px){.outer-frame{margin:16px;border-radius:16px;overflow:hidden}.outer-frame::before{content:'';position:absolute;inset:0;border:1px solid rgba(99,102,241,.12);border-radius:16px;pointer-events:none}}
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.85);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid rgba(255,255,255,.06);padding:0 24px;height:64px;display:flex;align-items:center;gap:24px}
.header-brand{display:flex;align-items:center;gap:10px;font-size:1.125rem;font-weight:700;letter-spacing:-.02em;color:#e1e2e9;white-space:nowrap;text-decoration:none}
.header-brand .logo{width:34px;height:34px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;font-weight:800}
.header-tagline{font-size:.75rem;color:rgba(255,255,255,.35);margin-left:-14px;white-space:nowrap;display:none}@media(min-width:768px){.header-tagline{display:block}}
.search-wrap{flex:1;max-width:480px;position:relative}
.search-wrap input{width:100%;height:40px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:0 16px 0 40px;font-size:.875rem;color:#e1e2e9;outline:none;transition:all .2s ease}
.search-wrap input:focus{border-color:rgba(99,102,241,.4);background:rgba(255,255,255,.06);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.search-wrap input::placeholder{color:rgba(255,255,255,.25)}
.search-wrap .search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.25);font-size:.875rem;pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;font-size:1rem;display:none;padding:4px;border-radius:50%}
.search-clear:hover{color:rgba(255,255,255,.6);background:rgba(255,255,255,.06)}.search-clear.visible{display:flex;align-items:center;justify-content:center}
.app-layout{display:flex;position:relative;z-index:1;min-height:calc(100vh - 64px)}
.sidebar{width:220px;flex-shrink:0;background:rgba(10,10,15,.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-right:1px solid rgba(255,255,255,.05);padding:20px 12px;overflow-y:auto;position:sticky;top:64px;max-height:calc(100vh - 64px);transition:transform .3s ease}
.sidebar-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.2);padding:0 12px 12px}
.sidebar-nav{list-style:none;display:flex;flex-direction:column;gap:2px}
.sidebar-nav li a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:.85rem;color:rgba(255,255,255,.5);text-decoration:none;transition:all .2s ease;cursor:pointer}
.sidebar-nav li a:hover{color:#e1e2e9;background:rgba(255,255,255,.04)}
.sidebar-nav li a.active{color:#e1e2e9;background:rgba(99,102,241,.12);font-weight:600}
.sidebar-nav li a .nav-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:0;transition:opacity .2s}
.sidebar-nav li a.active .nav-dot{opacity:1;background:#6366f1}
.sidebar-count{margin-left:auto;font-size:.7rem;background:rgba(255,255,255,.04);padding:2px 7px;border-radius:6px}
.mobile-nav-toggle{display:none;position:fixed;bottom:24px;right:24px;z-index:200;width:48px;height:48px;border-radius:50%;background:rgba(99,102,241,.9);border:none;cursor:pointer;color:#fff;font-size:1.25rem;box-shadow:0 4px 20px rgba(99,102,241,.4);backdrop-filter:blur(10px);align-items:center;justify-content:center}
@media(max-width:900px){.sidebar{position:fixed;left:0;top:64px;bottom:0;z-index:150;transform:translateX(-100%);box-shadow:4px 0 30px rgba(0,0,0,.5)}.sidebar.open{transform:translateX(0)}.mobile-nav-toggle{display:flex}}
.main-content{flex:1;padding:32px 24px 64px;overflow-y:auto;max-width:1400px}
.category-section{margin-bottom:48px}
.category-header{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.category-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:rgba(99,102,241,.1);flex-shrink:0}
.category-header h2{font-size:1.35rem;font-weight:700;letter-spacing:-.02em;color:#e1e2e9}
.category-header .count{font-size:.75rem;color:rgba(255,255,255,.25);background:rgba(255,255,255,.04);padding:3px 10px;border-radius:8px}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
@media(max-width:1200px){.tool-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}}
@media(max-width:900px){.tool-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
@media(max-width:600px){.tool-grid{grid-template-columns:1fr 1fr;gap:8px}}
.tool-card{position:relative;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:20px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);overflow:hidden}
.tool-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 100% 100% at 50% -20%,rgba(99,102,241,.08),transparent 70%);opacity:0;transition:opacity .3s}
.tool-card:hover{background:rgba(255,255,255,.04);border-color:rgba(99,102,241,.2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3),0 0 0 1px rgba(99,102,241,.1) inset}
.tool-card:hover::before{opacity:1}
.tool-card:active{transform:translateY(0);transition:transform .1s}
.tool-card-badge{position:absolute;top:12px;right:12px;font-size:.6rem;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:6px;letter-spacing:.05em}
.badge-ai{background:rgba(6,182,212,.15);color:#06b6d4}.badge-hot{background:rgba(139,92,246,.15);color:#a78bfa}.badge-new{background:rgba(99,102,241,.15);color:#818cf8}.badge-live{background:rgba(34,197,94,.15);color:#22c55e}
.tool-card-icon{width:42px;height:42px;border-radius:12px;background:rgba(99,102,241,.1);display:flex;align-items:center;justify-content:center;font-size:1.15rem;margin-bottom:14px;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.tool-card:hover .tool-card-icon{transform:scale(1.08)}
.tool-card h3{font-size:.95rem;font-weight:600;color:#e1e2e9;margin-bottom:6px;letter-spacing:-.01em}
.tool-card p{font-size:.8rem;color:rgba(255,255,255,.35);line-height:1.5}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.workspace-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .3s ease}
.workspace-overlay.open{opacity:1;pointer-events:auto}
.workspace-panel{position:fixed;right:0;top:0;bottom:0;z-index:401;width:620px;max-width:100vw;background:rgba(14,14,22,.97);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-left:1px solid rgba(255,255,255,.06);transform:translateX(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.5)}
.workspace-panel.open{transform:translateX(0)}
.workspace-header{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0}
.workspace-header .ws-icon{font-size:1.4rem}.workspace-header h3{font-size:1.05rem;font-weight:650;flex:1}
.workspace-header button{width:32px;height:32px;border-radius:8px;border:none;background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.workspace-header button:hover{background:rgba(255,255,255,.1);color:#e1e2e9}
.workspace-body{flex:1;overflow-y:auto;padding:24px}
.upload-zone{border:2px dashed rgba(255,255,255,.1);border-radius:16px;padding:40px 24px;text-align:center;cursor:pointer;transition:all .2s ease;background:rgba(255,255,255,.015);margin-bottom:20px}
.upload-zone:hover,.upload-zone.dragover{border-color:rgba(99,102,241,.4);background:rgba(99,102,241,.04)}
.upload-zone .upload-icon{font-size:2.5rem;margin-bottom:12px;display:block}
.upload-zone .upload-text{font-size:.9rem;color:rgba(255,255,255,.4);margin-bottom:6px}
.upload-zone .upload-hint{font-size:.75rem;color:rgba(255,255,255,.2)}
.upload-zone input[type=file]{display:none}
.ws-file-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.ws-file-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px;font-size:.85rem}
.ws-file-item .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,255,255,.7)}
.ws-file-item .fsize{font-size:.75rem;color:rgba(255,255,255,.25)}
.ws-file-item .fremove{background:none;border:none;color:rgba(255,255,255,.25);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:4px}
.ws-file-item .fremove:hover{color:#ef4444;background:rgba(239,68,68,.1)}
.ws-options{margin-bottom:20px}
.ws-options label{display:block;font-size:.8rem;color:rgba(255,255,255,.4);margin-bottom:6px}
.ws-options input[type=text],.ws-options input[type=number],.ws-options select,.ws-options textarea{width:100%;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;font-size:.88rem;color:#e1e2e9;outline:none;transition:border .2s}
.ws-options input:focus,.ws-options select:focus,.ws-options textarea:focus{border-color:rgba(99,102,241,.4)}
.ws-options select option{background:#1a1a28;color:#e1e2e9}
.ws-options .opt-row{display:flex;gap:10px;margin-bottom:12px}
.ws-options .opt-row>*{flex:1}
.ws-options textarea{min-height:100px;resize:vertical;font-family:monospace}
.ws-options .slider-row{display:flex;align-items:center;gap:12px}
.ws-options input[type=range]{flex:1;accent-color:#6366f1}
.ws-options .slider-val{font-size:.8rem;color:rgba(255,255,255,.6);min-width:50px;text-align:right}
.ws-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.ws-actions button{padding:10px 24px;border-radius:10px;font-size:.85rem;border:none;cursor:pointer;font-weight:600;transition:all .2s ease}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.3)}
.btn-primary:hover:not(:disabled){box-shadow:0 6px 20px rgba(99,102,241,.45);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:rgba(255,255,255,.06);color:#e1e2e9}
.btn-secondary:hover{background:rgba(255,255,255,.12)}
.btn-danger{background:rgba(239,68,68,.1);color:#ef4444}.btn-danger:hover{background:rgba(239,68,68,.2)}
.ws-result{margin-top:20px}
.ws-result .result-preview{max-width:100%;max-height:300px;border-radius:10px;border:1px solid rgba(255,255,255,.06);object-fit:contain;background:rgba(0,0,0,.3)}
.ws-result .result-text{padding:16px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);border-radius:10px;font-size:.85rem;color:rgba(255,255,255,.5);max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
.ws-progress{display:none;margin:16px 0}.ws-progress.show{display:block}
.ws-progress .prog-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.ws-progress .prog-fill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:2px;transition:width .3s ease;width:0%}
.ws-progress .prog-text{font-size:.75rem;color:rgba(255,255,255,.35);margin-top:6px}
.recording-indicator{display:none;align-items:center;gap:8px;padding:12px 16px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;margin:16px 0}
.recording-indicator.show{display:flex}
.rec-dot{width:10px;height:10px;border-radius:50%;background:#ef4444;animation:pulse-dot .8s infinite}
.rec-timer{font-size:.9rem;font-weight:600;color:#ef4444;font-variant-numeric:tabular-nums}
.status-ready{color:#22c55e}.status-empty{color:rgba(255,255,255,.2)}
.status-wip{color:rgba(255,255,255,.3);font-size:.85rem;line-height:1.7;padding:20px 0}
.pdf-viewer{max-width:100%;border:1px solid rgba(255,255,255,.06);border-radius:10px;overflow:hidden;background:#fff;min-height:400px}
.pdf-viewer canvas{display:block;margin:0 auto;max-width:100%}
.signature-pad{border:2px dashed rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.98);cursor:crosshair;margin:16px 0;touch-action:none}
.crop-container{position:relative;max-width:100%;overflow:hidden;margin:16px 0;border-radius:10px;user-select:none}
.crop-container img{display:block;max-width:100%}
.crop-box{position:absolute;border:2px solid #6366f1;box-shadow:0 0 0 9999px rgba(0,0,0,.5);cursor:move}
.crop-handle{position:absolute;width:10px;height:10px;background:#6366f1;border:2px solid #fff;border-radius:2px}
.footer{border-top:1px solid rgba(255,255,255,.05);background:rgba(10,10,15,.6);backdrop-filter:blur(12px);padding:40px 24px 32px}
.footer-inner{max-width:1400px;margin:0 auto;display:flex;flex-wrap:wrap;gap:40px;justify-content:space-between}
.footer-brand h4{font-size:1rem;font-weight:700;margin-bottom:8px}
.footer-brand p{font-size:.8rem;color:rgba(255,255,255,.3);max-width:280px;line-height:1.6}
.footer-bottom{max-width:1400px;margin:24px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.04);display:flex;flex-wrap:wrap;gap:12px;justify-content:space-between;font-size:.75rem;color:rgba(255,255,255,.18)}
.no-results{text-align:center;padding:60px 20px;color:rgba(255,255,255,.2)}
.no-results .icon{font-size:3rem;margin-bottom:16px}
.zip-tree{font-size:.85rem;color:rgba(255,255,255,.6);margin:16px 0;max-height:300px;overflow-y:auto}
.zip-tree .zip-item{padding:4px 8px;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:8px}
.zip-tree .zip-item:hover{background:rgba(99,102,241,.08);color:#e1e2e9}
.zip-tree .zip-folder{color:#818cf8}
@media(max-width:900px){.main-content{padding:20px 16px 48px}.header{padding:0 16px}}
@media(max-width:600px){.tool-card{padding:14px}.tool-card h3{font-size:.85rem}.search-wrap{max-width:200px}.workspace-panel{width:100vw}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="outer-frame">
<header class="header">
  <a class="header-brand" href="#"><span class="logo">M</span>即刻办公</a>
  <span class="header-tagline">一站式在线办公工具箱</span>
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="搜索工具..." autocomplete="off">
    <button class="search-clear" id="searchClear">&times;</button>
  </div>
</header>
<div class="app-layout">
<nav class="sidebar" id="sidebar">
  <div class="sidebar-title">工具分类</div>
  <ul class="sidebar-nav" id="sidebarNav"><li><a class="active" data-cat="all">全部工具<span class="sidebar-count">86</span></a></li></ul>
</nav>
<button class="mobile-nav-toggle" id="mobileNavToggle" aria-label="菜单">&#9776;</button>
<main class="main-content" id="mainContent">
  <div class="loading-skeleton" id="loadingSkeleton">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px">
      <div style="width:48px;height:48px;border:3px solid rgba(99,102,241,.15);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite"></div>
      <p style="color:rgba(255,255,255,.35);font-size:.9rem">正在加载工具库...</p>
    </div>
  </div>
  <div class="no-results" id="noResults" style="display:none"><div class="icon">&#128270;</div><p>未找到匹配的工具</p></div>
</main>
</div>
<footer class="footer">
  <div class="footer-inner"><div class="footer-brand"><h4>即刻办公</h4><p>PDF 处理、格式转换、视频音频工具、图片处理、OCR。所有处理在浏览器本地完成，文件即用即焚。</p></div></div>
  <div class="footer-bottom"><span>&copy; 2026 即刻办公</span><span>75 款工具，70 款浏览器端运行</span></div>
</footer>
</div>

<div class="workspace-overlay" id="wsOverlay"></div>
<div class="workspace-panel" id="wsPanel">
  <div class="workspace-header">
    <span class="ws-icon" id="wsIcon"></span><h3 id="wsTitle"></h3>
    <button onclick="closeWorkspace()" aria-label="关闭">&times;</button>
  </div>
  <div class="workspace-body" id="wsBody"></div>
</div>

<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const tools=[
  {id:'pdf-merge',name:'PDF 合并',desc:'将多个 PDF 文档合并为一个文件',icon:'📎',cat:'pdf',badge:'live',m:'m'},
  {id:'pdf-split',name:'PDF 拆分',desc:'分离 PDF 页面或提取特定部分',icon:'✂️',cat:'pdf',m:'m'},
  {id:'pdf-compress',name:'PDF 压缩',desc:'减小 PDF 文件大小，保持质量',icon:'🗜️',cat:'pdf',m:'m'},
  {id:'pdf-edit',name:'PDF 编辑',desc:'在线编辑 PDF 文本和图片',icon:'✏️',cat:'pdf',badge:'hot',m:'h'},
  {id:'pdf-rotate',name:'PDF 旋转',desc:'旋转 PDF 页面方向',icon:'🔄',cat:'pdf',m:'l'},
  {id:'pdf-crop',name:'PDF 裁剪',desc:'裁剪 PDF 页面边距和区域',icon:'✂️',cat:'pdf',m:'m'},
  {id:'pdf-unlock',name:'PDF 解锁',desc:'移除 PDF 密码保护',icon:'🔓',cat:'pdf',m:'l'},
  {id:'pdf-protect',name:'PDF 加密保护',desc:'为 PDF 添加密码保护',icon:'🔒',cat:'pdf',m:'l'},
  {id:'pdf-sign',name:'PDF 签名',desc:'在 PDF 文档中添加电子签名',icon:'🖊️',cat:'pdf',m:'m'},
  {id:'pdf-watermark',name:'PDF 水印',desc:'为 PDF 添加文字或图片水印',icon:'💧',cat:'pdf',m:'m'},

function parsePageRanges(str,total){const result=new Set();const parts=str.split(',');for(const p of parts){const t=p.trim();if(t.includes('-')){const[s,e]=t.split('-').map(n=>parseInt(n.trim()));for(let i=s;i<=e;i++){if(i>=1&&i<=total)result.add(i)}}else{const n=parseInt(t);if(n>=1&&n<=total)result.add(n)}}return[...result].sort((a,b)=>a-b)}
function audioBufferToWav(buffer){const ch=buffer.numberOfChannels,sr=buffer.sampleRate,len=buffer.length,ba=ch*2,ds=len*ba,buf=new ArrayBuffer(44+ds),v=new DataView(buf);const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))};ws(0,'RIFF');v.setUint32(4,36+ds,true);ws(8,'WAVE');ws(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,ch,true);v.setUint32(24,sr,true);v.setUint32(28,sr*ba,true);v.setUint16(32,ba,true);v.setUint16(34,16,true);ws(36,'data');v.setUint32(40,ds,true);let o=44;for(let i=0;i<len;i++){for(let c=0;c<ch;c++){const s=Math.max(-1,Math.min(1,buffer.getChannelData(c)[i]));v.setInt16(o,s<0?s*0x8000:s*0x7FFF,true);o+=2}}return new Blob([buf],{type:'audio/wav'})}

function wsAddFiles(files){for(const f of files){if(!wsFiles.find(x=>x.name===f.name&&x.size===f.size))wsFiles.push(f)}renderFileList();if(wsTool.id==='conv-archive'&&wsFiles.length)handleZipExtract();if(['aud-trim','aud-merge','aud-speed','aud-pitch','aud-reverse','aud-volume','aud-eq'].includes(wsTool.id)&&wsFiles.length)loadAudioForProcessing();if(['vid-trim','vid-merge','vid-speed','vid-volume','vid-crop','vid-rotate','vid-flip','vid-resize','vid-edit'].includes(wsTool.id)&&wsFiles.length)previewVideo()}

function wsRemoveFile(i){wsFiles.splice(i,1);renderFileList();if(wsTool.id==='conv-archive'&&wsFiles.length)handleZipExtract()}

  else if(['conv-archive'].includes(id))h='<span style="font-size:.8rem;color:rgba(255,255,255,.3)">上传 ZIP 文件自动解压</span>';
  else if(['img-crop'].includes(id))h=wsFiles.length?`<button class="btn-primary" onclick="doCropImage()">✂️ 裁剪并下载</button>`:'';

// ===== PDF OPERATIONS (using PDF-lib) =====
async function processTool(){const id=wsTool.id;setProgress(10,'处理中...');try{
  const m={};for(const el of document.querySelectorAll('#wsOptions input, #wsOptions select'))m[el.id]=el.value;
  const ab=wsFiles.length?await wsFiles[0].arrayBuffer():null;
  switch(id){
    case'pdf-merge':await pdfMerge();break;
    case'pdf-split':case'pdf-rearrange':await pdfSplitOrRearrange(id);break;
    case'pdf-compress':await pdfCompress(m.optCompQ?parseFloat(m.optCompQ):0.5);break;
    case'pdf-rotate':await pdfRotate(parseInt(m.optRot)||90);break;
    case'pdf-crop':await pdfCrop(m);break;
    case'pdf-protect':await pdfProtect(m.optPass||'');break;
    case'pdf-flatten':await doPdfFlatten();break;
    case'pdf-resize':await pdfResize(parseInt(m.optRW)||595,parseInt(m.optRH)||842);break;
    case'pdf-metadata':await pdfMetadata(m);break;
    case'pdf-watermark':await pdfWatermark(m);break;
    case'pdf-pagenum':await pdfPageNum(m);break;
    case'pdf-header-footer':await pdfHeaderFooter(m);break;
    case'pdf-extract-text':await pdfExtractText();break;
    case'word-to-pdf':case'excel-to-pdf':case'ppt-to-pdf':await officeToPdf();break;
    case'jpg-to-pdf':case'png-to-pdf':await imagesToPdf();break;
    case'conv-img':await convertImage();break;
    case'img-compress':await compressImage();break;
    case'img-resize':await resizeImage();break;
    case'img-rotate':case'img-flip':await transformImage(id,m);break;
    case'conv-html-pdf':htmlToPdf();break;
    case'conv-heic':await convertHeic();break;
    case'conv-video':await convertVideo();break;
    case'conv-audio':await convertAudio();break;
    default:if(['aud-trim','aud-speed','aud-pitch','aud-reverse','aud-volume','aud-merge'].includes(id))await processAudio();else if(['vid-edit','vid-trim','vid-merge','vid-speed','vid-volume','vid-crop','vid-rotate','vid-flip','vid-resize'].includes(id))await processVideo();
  }
}catch(e){setProgress(0,'失败：'+e.message);document.getElementById('wsResult').innerHTML=`<div style="padding:12px;background:rgba(239,68,68,.08);border-radius:10px;color:#ef4444;font-size:.85rem">${e.message}</div>`}}

async function pdfMerge(){const pdf=await PDFLib.PDFDocument.create();for(let i=0;i<wsFiles.length;i++){setProgress(10+Math.floor(80*i/wsFiles.length),`合并 ${i+1}/${wsFiles.length}...`);const s=await PDFLib.PDFDocument.load(await wsFiles[i].arrayBuffer(),{ignoreEncryption:true});const p=await pdf.copyPages(s,s.getPageIndices());p.forEach(x=>pdf.addPage(x))}const b=await pdf.save();downloadBlob(b,'merged.pdf','application/pdf');setProgress(100,'完成！')}
async function pdfSplitOrRearrange(id){const ab=await wsFiles[0].arrayBuffer();const s=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});const total=s.getPageCount();let pages;if(id==='pdf-split'){const str=document.getElementById('optPages')?.value||'';pages=parsePageRanges(str,total);if(!pages.length)throw new Error('请指定页码范围')}else{const str=document.getElementById('optOrder')?.value||'';pages=str.split(',').map(x=>parseInt(x.trim())).filter(n=>n>=1&&n<=total);if(!pages.length)throw new Error('请指定页面顺序')}const nd=await PDFLib.PDFDocument.create();const cp=await nd.copyPages(s,pages.map(p=>p-1));cp.forEach(x=>nd.addPage(x));const b=await nd.save();downloadBlob(b,id==='pdf-split'?'split.pdf':'rearranged.pdf','application/pdf');setProgress(100,'完成！')}
async function pdfCompress(quality){const s=await PDFLib.PDFDocument.load(await wsFiles[0].arrayBuffer(),{ignoreEncryption:true});const pages=s.getPages();for(const page of pages){const{width,height}=page.getSize();page.setSize(width,height)}const b=await s.save({useObjectStreams:quality<0.7});downloadBlob(b,'compressed.pdf','application/pdf');setProgress(100,'完成！')}
async function pdfRotate(deg){const s=await PDFLib.PDFDocument.load(await wsFiles[0].arrayBuffer(),{ignoreEncryption:true});s.getPages().forEach(p=>p.setRotation(PDFLib.degrees(deg)));const b=await s.save();downloadBlob(b,'rotated.pdf','application/pdf');setProgress(100,'完成！')}
async function pdfCrop(m){const t=parseInt(m.optCT)||0,r=parseInt(m.optCR)||0,bm=parseInt(m.optCB)||0,l=parseInt(m.optCL)||0;const s=await PDFLib.PDFDocument.load(await wsFiles[0].arrayBuffer(),{ignoreEncryption:true});s.getPages().forEach(p=>{const{width,height}=p.getSize();p.setCropBox(l,bm,width-r,height-t)});const bb=await s.save();downloadBlob(bb,'cropped.pdf','application/pdf');setProgress(100,'完成！')}
async function pdfProtect(pw){if(!pw)throw new Error('请输入密码');const s=await PDFLib.PDFDocument.load(await wsFiles[0].arrayBuffer(),{ignoreEncryption:true});s.encrypt({userPassword:pw,ownerPassword:pw+'_owner',permissions:{printing:'highResolution',modifying:false,copying:false,annotating:false,fillingForms:true,contentAccessibility:true,documentAssembly:false}});const b=await s.save();downloadBlob(b,'protected.pdf','application/pdf');setProgress(100,'完成！')}
async function unlockPdf(){const pw=document.getElementById('optPass')?.value||'';const s=await PDFLib.PDFDocument.load(await wsFiles[0].arrayBuffer(),{ignoreEncryption:true,password:pw||undefined});const b=await s.save();downloadBlob(b,'unlocked.pdf','application/pdf');setProgress(100,'完成！')}
async function doPdfFlatten(){const s=await PDFLib.PDFDocument.load(await wsFiles[0].arrayBuffer(),{ignoreEncryption:true});s.flatten();const b=await s.save();downloadBlob(b,'flattened.pdf','application/pdf');setProgress(100,'完成！')}
async function pdfResize(w,h){const s=await PDFLib.PDFDocument.load(await wsFiles[0].arrayBuffer(),{ignoreEncryption:true});s.getPages().forEach(p=>{const ow=p.getSize().width,oh=p.getSize().height;p.setSize(w,h);const sx=w/ow,sy=h/oh;p.scaleContent(sx,sy)});const b=await s.save();downloadBlob(b,'resized.pdf','application/pdf');setProgress(100,'完成！')}
async function pdfMetadata(m){const s=await PDFLib.PDFDocument.load(await wsFiles[0].arrayBuffer(),{ignoreEncryption:true});if(m.optTitle)s.setTitle(m.optTitle);if(m.optAuthor)s.setAuthor(m.optAuthor);if(m.optSubject)s.setSubject(m.optSubject);if(m.optKeywords)s.setKeywords(m.optKeywords.split(',').map(k=>k.trim()));const b=await s.save();downloadBlob(b,'meta_'+wsFiles[0].name,'application/pdf');setProgress(100,'完成！')}
async function pdfWatermark(m){const text=m.optWMText||'CONFIDENTIAL';const op=parseFloat(m.optWMOp)||0.3,size=parseInt(m.optWMSize)||72;const s=await PDFLib.PDFDocument.load(await wsFiles[0].arrayBuffer(),{ignoreEncryption:true});const pages=s.getPages();const font=await s.embedFont(PDFLib.StandardFonts.Helvetica);for(let i=0;i<pages.length;i++){const p=pages[i];const{width,height}=p.getSize();p.drawText(text,{x:width/2-size*2,y:height/2,size,font,color:PDFLib.rgb(0,0,0),opacity:op,rotate:PDFLib.degrees(-30)})}const b=await s.save();downloadBlob(b,'watermarked.pdf','application/pdf');setProgress(100,'完成！')}
async function pdfPageNum(m){const pos=m.optPNPos||'bottom-center',start=parseInt(m.optPNStart)||1;const s=await PDFLib.PDFDocument.load(await wsFiles[0].arrayBuffer(),{ignoreEncryption:true});const pages=s.getPages();const font=await s.embedFont(PDFLib.StandardFonts.Helvetica);for(let i=0;i<pages.length;i++){const p=pages[i];const{width,height}=p.getSize();const n=(start+i).toString();let x;if(pos.includes('center'))x=width/2-10;else if(pos.includes('right'))x=width-40;else x=20;const y=pos.includes('top')?height-20:20;p.drawText(n,{x,y,size:10,font,color:PDFLib.rgb(0,0,0)})}const b=await s.save();downloadBlob(b,'numbered.pdf','application/pdf');setProgress(100,'完成！')}
async function pdfHeaderFooter(m){const hdr=m.optHdr||'',ftr=m.optFtr||'';const s=await PDFLib.PDFDocument.load(await wsFiles[0].arrayBuffer(),{ignoreEncryption:true});const pages=s.getPages();const font=await s.embedFont(PDFLib.StandardFonts.Helvetica);for(const p of pages){const{width,height}=p.getSize();if(hdr)p.drawText(hdr,{x:20,y:height-18,size:9,font,color:PDFLib.rgb(0.3,0.3,0.3)});if(ftr)p.drawText(ftr,{x:20,y:8,size:9,font,color:PDFLib.rgb(0.3,0.3,0.3)})}const b=await s.save();downloadBlob(b,'headfoot.pdf','application/pdf');setProgress(100,'完成！')}
async function pdfExtractText(){const ab=await wsFiles[0].arrayBuffer();const s=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});document.getElementById('wsProgress').classList.remove('show');document.getElementById('wsResult').innerHTML=`<div class="result-text">PDF 页数：${s.getPages().length} · 文件大小：${fmtSize(wsFiles[0].size)}\n\n提示：纯前端文本提取需要 PDF.js 渲染引擎。我们将在下一版中集成此功能。您可使用「PDF OCR」工具对扫描件进行文字识别。</div>`}

async function loadAudioForProcessing(){if(!wsFiles.length)return;wsAudioCtx=new(window.AudioContext||window.webkitAudioContext)();wsAudioBuffer=await wsAudioCtx.decodeAudioData(await wsFiles[0].arrayBuffer());document.getElementById('wsResult').innerHTML=`<div style="font-size:.85rem;color:rgba(255,255,255,.5)">时长：${wsAudioBuffer.duration.toFixed(1)}s · ${wsAudioBuffer.sampleRate}Hz · ${wsAudioBuffer.numberOfChannels}声道</div>`}
async function processAudio(){if(!wsAudioBuffer)return;setProgress(10,'处理中...');const id=wsTool.id;let buf=wsAudioBuffer;const ch=buf.numberOfChannels,sr=buf.sampleRate;
  if(id==='aud-trim'){const s=parseFloat(document.getElementById('optStart')?.value||'0'),eStr=document.getElementById('optEnd')?.value,e=eStr?parseFloat(eStr):buf.duration;const ss=Math.floor(s*sr),es=Math.floor(e*sr),len=es-ss;const nb=wsAudioCtx.createBuffer(ch,len,sr);for(let c=0;c<ch;c++){const sd=buf.getChannelData(c),dd=nb.getChannelData(c);for(let i=0;i<len;i++)dd[i]=sd[ss+i]||0}buf=nb}
  else if(id==='aud-speed'){const rate=(parseInt(document.getElementById('optSpeed')?.value||'100'))/100;const nl=Math.floor(buf.length/rate);const nb=wsAudioCtx.createBuffer(ch,nl,sr);for(let c=0;c<ch;c++){const sd=buf.getChannelData(c),dd=nb.getChannelData(c);for(let i=0;i<nl;i++)dd[i]=sd[Math.floor(i*rate)]||0}buf=nb}
  else if(id==='aud-pitch'){const st=parseInt(document.getElementById('optPitch')?.value||'0');const pr=Math.pow(2,st/12);const nl=Math.floor(buf.length/pr);const nb=wsAudioCtx.createBuffer(ch,nl,sr);for(let c=0;c<ch;c++){const sd=buf.getChannelData(c),dd=nb.getChannelData(c);for(let i=0;i<nl;i++)dd[i]=sd[Math.floor(i*pr)]||0}buf=nb}
  else if(id==='aud-reverse'){const nb=wsAudioCtx.createBuffer(ch,buf.length,sr);for(let c=0;c<ch;c++){const sd=buf.getChannelData(c),dd=nb.getChannelData(c);for(let i=0;i<buf.length;i++)dd[i]=sd[buf.length-1-i]}buf=nb}
  else if(id==='aud-volume'){const vol=(parseInt(document.getElementById('optVol')?.value||'100'))/100;const nb=wsAudioCtx.createBuffer(ch,buf.length,sr);for(let c=0;c<ch;c++){const sd=buf.getChannelData(c),dd=nb.getChannelData(c);for(let i=0;i<buf.length;i++)dd[i]=Math.max(-1,Math.min(1,sd[i]*vol))}buf=nb}
  else if(id==='aud-merge'){let tl=0;const bfs=[];for(const f of wsFiles){const b=await wsAudioCtx.decodeAudioData(await f.arrayBuffer());bfs.push(b);tl+=b.length}const nb=wsAudioCtx.createBuffer(ch,tl,sr);let off=0;for(const b of bfs){for(let c=0;c<ch;c++){const src=c<b.numberOfChannels?b.getChannelData(c):new Float32Array(b.length);nb.getChannelData(Math.min(c,ch-1)).set(src,off)}off+=b.length}buf=nb}
  setProgress(70,'编码WAV...');const wav=audioBufferToWav(buf);downloadBlob(wav,'output.wav','audio/wav');setProgress(100,'完成！')}

async function processVideo(){const id=wsTool.id;if(!wsFiles.length)return;wsVideoEl=document.getElementById('wsVideoPreview');if(!wsVideoEl){const v=document.createElement('video');v.src=URL.createObjectURL(wsFiles[0]);v.controls=true;v.style.cssText='max-width:100%;max-height:200px;border-radius:10px';document.getElementById('wsResult').appendChild(v);wsVideoEl=v;await new Promise(r=>{wsVideoEl.onloadedmetadata=r;if(wsVideoEl.readyState>=2)r()})}

async function extractPdfText(file){
  const doc=await pdfjsLib.getDocument(URL.createObjectURL(file)).promise;
  let text='';
  for(let i=1;i<=doc.numPages;i++){
    const page=await doc.getPage(i);
    const content=await page.getTextContent();
    const lines={};
    content.items.forEach(item=>{
      const y=Math.round(item.transform[5]);
      if(!lines[y])lines[y]=[];
      lines[y].push(item);
    });
    const sortedYs=Object.keys(lines).sort((a,b)=>b-a);
    for(const y of sortedYs){
      const lineItems=lines[y].sort((a,b)=>a.transform[4]-b.transform[4]);
      text+=lineItems.map(it=>it.str).join(' ')+'\n';
    }
    text+='\n';
  }
  return text;
}

function checkAI(msg){
  if(typeof window.ai==='undefined'||!window.ai.languageModel){
    document.getElementById('wsResult').innerHTML='<div class="result-text" style="color:#fbbf24">⚠️ '+msg+'</div>';
    return false;
  }
  return true;
}

async function handlePdfToWord(){
  if(!wsFiles.length)return;
  setProgress(10,'提取 PDF 文本...');
  const doc=await pdfjsLib.getDocument(URL.createObjectURL(wsFiles[0])).promise;
  const {Document,Packer,Paragraph,TextRun}=docx;
  const children=[];
  for(let i=1;i<=doc.numPages;i++){
    setProgress(10+Math.floor(80*i/doc.numPages),`处理 ${i}/${doc.numPages}...`);
    const page=await doc.getPage(i);
    const content=await page.getTextContent();
    const lines={};
    content.items.forEach(item=>{
      const y=Math.round(item.transform[5]);
      if(!lines[y])lines[y]=[];
      lines[y].push(item);
    });
    const sortedYs=Object.keys(lines).sort((a,b)=>b-a);
    for(const y of sortedYs){
      const lineItems=lines[y].sort((a,b)=>a.transform[4]-b.transform[4]);
      const text=lineItems.map(it=>it.str).join(' ').trim();
      if(text)children.push(new Paragraph({children:[new TextRun({text,size:22})]}));

async function handlePdfToHtml(){

  const doc=await pdfjsLib.getDocument(URL.createObjectURL(wsFiles[0])).promise;
  let html='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:sans-serif;margin:40px}.page{position:relative;margin-bottom:20px;border:1px solid #ddd;overflow:hidden}.text-block{position:absolute;white-space:pre-wrap}</style></head><body>';

    const vp=page.getViewport({scale:1});
    const content=await page.getTextContent();
    html+=`<div class="page" style="width:${vp.width}px;height:${vp.height}px">`;

    });

  setProgress(95,'下载中...');
  const blob=new Blob([html],{type:'text/html'});
  downloadBlob(blob,wsFiles[0].name.replace(/\.pdf$/i,'.html'),'text/html');

async function handlePdfTranslate(){
  if(!wsFiles.length)return;
  const lang=document.getElementById('optTransLang')?.value||'zh';
  setProgress(10,'提取 PDF 文本...');
  const doc=await pdfjsLib.getDocument(URL.createObjectURL(wsFiles[0])).promise;
  const pdfDoc=await PDFLib.PDFDocument.create();
  const font=await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
  for(let i=1;i<=doc.numPages;i++){
    setProgress(10+Math.floor(80*i/doc.numPages),`翻译 ${i}/${doc.numPages}...`);
    const page=await doc.getPage(i);
    const content=await page.getTextContent();
    const {width,height}=page.getViewport({scale:1});
    const p=pdfDoc.addPage([width,height]);
    for(const item of content.items){
      const txt=item.str.trim();
      if(!txt)continue;
      let translated=txt;
      try{
        const url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${lang}&dt=t&q=${encodeURIComponent(txt)}`;
        const res=await fetch(url);
        const json=await res.json();
        const trText=json[0]?.map(s=>s[0]).join('')||txt;
        translated=trText;
      }catch(e){}
      const x=item.transform[4],y=height-item.transform[5],fs=Math.abs(item.transform[0])*0.8;
      p.drawText(translated,{x,y,size:Math.max(6,Math.min(fs,16)),font,color:PDFLib.rgb(0,0,0)});
    }
  }
  setProgress(90,'生成 PDF...');
  const b=await pdfDoc.save();
  downloadBlob(b,wsFiles[0].name.replace(/\.pdf$/i,'_translated.pdf'),'application/pdf');
  setProgress(100,'完成！');
}

async function handleFontConvert(){
  if(!wsFiles.length)return;
  const fmt=document.getElementById('optFontFmt')?.value||'woff';
  setProgress(10,'加载字体...');
  const ab=await wsFiles[0].arrayBuffer();
  let font;
  try{font=opentype.parse(ab);}catch(e){document.getElementById('wsResult').innerHTML=`<div style="color:#ef4444;font-size:.85rem">字体解析失败：${e.message}<br>请确认上传的是有效的 TTF/OTF/WOFF 字体文件。</div>`;return}
  setProgress(50,'转换中...');
  try{
    let out;
    if(fmt==='woff')out=font.toArrayBuffer({type:'woff'});
    else if(fmt==='woff2')out=font.toArrayBuffer({type:'woff2'});
    else if(fmt==='otf')out=font.toArrayBuffer({type:'opentype'});
    else out=font.toArrayBuffer({type:'truetype'});
    const blob=new Blob([out],{type:'application/octet-stream'});
    downloadBlob(blob,wsFiles[0].name.replace(/\.[^.]+$/,'.'+fmt),'application/octet-stream');
    setProgress(100,'完成！');
  }catch(e){setProgress(0,'失败');document.getElementById('wsResult').innerHTML=`<div style="color:#ef4444;font-size:.85rem">转换失败：${e.message}</div>`}
}

const origRO=openWorkspace;openWorkspace=function(id){origRO(id);setTimeout(()=>{if(wsTool){if(wsTool.id==='pdf-sign')initSignPad();if(wsTool.id==='office-pdf-reader'&&wsFiles.length)initPdfViewer();if(wsTool.id==='vid-tts'){document.getElementById('wsResult').innerHTML=`<p style="font-size:.85rem;color:rgba(255,255,255,.4);margin-bottom:12px">浏览器内置语音合成（Web Speech API）</p><button class="btn-primary" onclick="startTts()">🗣️ 输入文字并朗读</button><p style="font-size:.75rem;color:rgba(255,255,255,.25);margin-top:12px">提示：浏览器朗读不支持直接导出音频文件</p>`}if(wsTool.id==='pdf-edit'&&wsFiles.length)doPdfEdit();if(wsTool.id==='ebook-reader'&&wsFiles.length)initEbookReader();if(wsTool.id==='pdf-chat')initPdfChat();}},100)}

renderTools();
</script>
