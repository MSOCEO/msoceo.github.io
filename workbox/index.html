<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即刻办公 — 一站式在线工具箱</title>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'SF Pro Display',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  background:#0a0a0f;color:#e1e2e9;min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

.bg-grid{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 10%,rgba(99,102,241,.06) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%,rgba(139,92,246,.05) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(6,182,212,.03) 0%,transparent 60%);
}
.bg-grid::after{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,black 30%,transparent 70%);
}

.outer-frame{
  position:relative;z-index:1;max-width:100%;margin:0;padding:0;
}
@media(min-width:1200px){
  .outer-frame{margin:16px;border-radius:16px;overflow:hidden}
  .outer-frame::before{content:'';position:absolute;inset:0;border:1px solid rgba(99,102,241,.12);border-radius:16px;pointer-events:none}
}

.header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,15,.85);backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:0 24px;height:64px;display:flex;align-items:center;gap:24px;
}
.header-brand{display:flex;align-items:center;gap:10px;font-size:1.125rem;font-weight:700;letter-spacing:-.02em;color:#e1e2e9;white-space:nowrap;text-decoration:none}
.header-brand .logo{width:34px;height:34px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;font-weight:800}
.header-tagline{font-size:.75rem;color:rgba(255,255,255,.35);margin-left:-14px;white-space:nowrap;display:none}
@media(min-width:768px){.header-tagline{display:block}}
.search-wrap{flex:1;max-width:480px;position:relative}
.search-wrap input{width:100%;height:40px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:0 16px 0 40px;font-size:.875rem;color:#e1e2e9;outline:none;transition:all .2s ease}
.search-wrap input:focus{border-color:rgba(99,102,241,.4);background:rgba(255,255,255,.06);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.search-wrap input::placeholder{color:rgba(255,255,255,.25)}
.search-wrap .search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.25);font-size:.875rem;pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;font-size:1rem;display:none;padding:4px;border-radius:50%}
.search-clear:hover{color:rgba(255,255,255,.6);background:rgba(255,255,255,.06)}
.search-clear.visible{display:flex;align-items:center;justify-content:center}

.app-layout{display:flex;position:relative;z-index:1;min-height:calc(100vh - 64px)}

.sidebar{
  width:220px;flex-shrink:0;background:rgba(10,10,15,.6);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-right:1px solid rgba(255,255,255,.05);
  padding:20px 12px;overflow-y:auto;position:sticky;top:64px;
  max-height:calc(100vh - 64px);transition:transform .3s ease;
}
.sidebar-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.2);padding:0 12px 12px}
.sidebar-nav{list-style:none;display:flex;flex-direction:column;gap:2px}
.sidebar-nav li a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:.85rem;color:rgba(255,255,255,.5);text-decoration:none;transition:all .2s ease;cursor:pointer}
.sidebar-nav li a:hover{color:#e1e2e9;background:rgba(255,255,255,.04)}
.sidebar-nav li a.active{color:#e1e2e9;background:rgba(99,102,241,.12);font-weight:600}
.sidebar-nav li a .nav-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:0;transition:opacity .2s}
.sidebar-nav li a.active .nav-dot{opacity:1;background:#6366f1}
.sidebar-count{margin-left:auto;font-size:.7rem;background:rgba(255,255,255,.04);padding:2px 7px;border-radius:6px}

.mobile-nav-toggle{display:none;position:fixed;bottom:24px;right:24px;z-index:200;width:48px;height:48px;border-radius:50%;background:rgba(99,102,241,.9);border:none;cursor:pointer;color:#fff;font-size:1.25rem;box-shadow:0 4px 20px rgba(99,102,241,.4);backdrop-filter:blur(10px);align-items:center;justify-content:center}
@media(max-width:900px){
  .sidebar{position:fixed;left:0;top:64px;bottom:0;z-index:150;transform:translateX(-100%);box-shadow:4px 0 30px rgba(0,0,0,.5)}
  .sidebar.open{transform:translateX(0)}
  .mobile-nav-toggle{display:flex}
}

.main-content{flex:1;padding:32px 24px 64px;overflow-y:auto;max-width:1400px}

.category-section{margin-bottom:48px}
.category-header{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.category-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:rgba(99,102,241,.1);flex-shrink:0}
.category-header h2{font-size:1.35rem;font-weight:700;letter-spacing:-.02em;color:#e1e2e9}
.category-header .count{font-size:.75rem;color:rgba(255,255,255,.25);background:rgba(255,255,255,.04);padding:3px 10px;border-radius:8px}

.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
@media(max-width:1200px){.tool-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}}
@media(max-width:900px){.tool-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
@media(max-width:600px){.tool-grid{grid-template-columns:1fr 1fr;gap:8px}}

.tool-card{
  position:relative;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:20px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);overflow:hidden;
}
.tool-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 100% 100% at 50% -20%,rgba(99,102,241,.08),transparent 70%);opacity:0;transition:opacity .3s}
.tool-card:hover{background:rgba(255,255,255,.04);border-color:rgba(99,102,241,.2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3),0 0 0 1px rgba(99,102,241,.1) inset}
.tool-card:hover::before{opacity:1}
.tool-card:active{transform:translateY(0);transition:transform .1s}
.tool-card-badge{position:absolute;top:12px;right:12px;font-size:.6rem;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:6px;letter-spacing:.05em}
.badge-ai{background:rgba(6,182,212,.15);color:#06b6d4}
.badge-hot{background:rgba(139,92,246,.15);color:#a78bfa}
.badge-new{background:rgba(99,102,241,.15);color:#818cf8}
.badge-live{background:rgba(34,197,94,.15);color:#22c55e}
.tool-card-icon{width:42px;height:42px;border-radius:12px;background:rgba(99,102,241,.1);display:flex;align-items:center;justify-content:center;font-size:1.15rem;margin-bottom:14px;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.tool-card:hover .tool-card-icon{transform:scale(1.08)}
.tool-card h3{font-size:.95rem;font-weight:600;color:#e1e2e9;margin-bottom:6px;letter-spacing:-.01em}
.tool-card p{font-size:.8rem;color:rgba(255,255,255,.35);line-height:1.5}
.tool-card .live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#22c55e;margin-right:4px;animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== Workspace Panel ===== */
.workspace-overlay{
  position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.5);
  opacity:0;pointer-events:none;transition:opacity .3s ease;
}
.workspace-overlay.open{opacity:1;pointer-events:auto}
.workspace-panel{
  position:fixed;right:0;top:0;bottom:0;z-index:401;
  width:560px;max-width:100vw;
  background:rgba(14,14,22,.97);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border-left:1px solid rgba(255,255,255,.06);
  transform:translateX(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.5);
}
.workspace-panel.open{transform:translateX(0)}
.workspace-header{
  display:flex;align-items:center;gap:12px;
  padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.05);
  flex-shrink:0;
}
.workspace-header .ws-icon{font-size:1.4rem}
.workspace-header h3{font-size:1.05rem;font-weight:650;flex:1}
.workspace-header button{
  width:32px;height:32px;border-radius:8px;border:none;
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);
  cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.workspace-header button:hover{background:rgba(255,255,255,.1);color:#e1e2e9}

.workspace-body{
  flex:1;overflow-y:auto;padding:24px;
}

/* Upload area */
.upload-zone{
  border:2px dashed rgba(255,255,255,.1);border-radius:16px;
  padding:40px 24px;text-align:center;cursor:pointer;
  transition:all .2s ease;background:rgba(255,255,255,.015);
  margin-bottom:20px;
}
.upload-zone:hover,.upload-zone.dragover{border-color:rgba(99,102,241,.4);background:rgba(99,102,241,.04)}
.upload-zone .upload-icon{font-size:2.5rem;margin-bottom:12px;display:block}
.upload-zone .upload-text{font-size:.9rem;color:rgba(255,255,255,.4);margin-bottom:6px}
.upload-zone .upload-hint{font-size:.75rem;color:rgba(255,255,255,.2)}
.upload-zone input[type=file]{display:none}

/* File list in workspace */
.ws-file-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.ws-file-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);border-radius:10px;
  font-size:.85rem;
}
.ws-file-item .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,255,255,.7)}
.ws-file-item .fsize{font-size:.75rem;color:rgba(255,255,255,.25)}
.ws-file-item .fremove{background:none;border:none;color:rgba(255,255,255,.25);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:4px}
.ws-file-item .fremove:hover{color:#ef4444;background:rgba(239,68,68,.1)}

/* Options */
.ws-options{margin-bottom:20px}
.ws-options label{display:block;font-size:.8rem;color:rgba(255,255,255,.4);margin-bottom:6px}
.ws-options input[type=text],.ws-options input[type=number],.ws-options select{
  width:100%;padding:10px 14px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:10px;
  font-size:.88rem;color:#e1e2e9;outline:none;transition:border .2s;
}
.ws-options input:focus,.ws-options select:focus{border-color:rgba(99,102,241,.4)}
.ws-options select option{background:#1a1a28;color:#e1e2e9}
.ws-options .opt-row{display:flex;gap:10px;margin-bottom:12px}
.ws-options .opt-row>*{flex:1}
.ws-options textarea{
  width:100%;min-height:100px;padding:10px 14px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;font-size:.85rem;color:#e1e2e9;
  outline:none;resize:vertical;font-family:monospace;
}
.ws-options textarea:focus{border-color:rgba(99,102,241,.4)}
.ws-options .slider-row{display:flex;align-items:center;gap:12px}
.ws-options input[type=range]{flex:1;accent-color:#6366f1}
.ws-options .slider-val{font-size:.8rem;color:rgba(255,255,255,.6);min-width:50px;text-align:right}

/* Buttons */
.ws-actions{display:flex;gap:10px;flex-wrap:wrap}
.ws-actions button{
  padding:10px 24px;border-radius:10px;font-size:.85rem;
  border:none;cursor:pointer;font-weight:600;transition:all .2s ease;
}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.3)}
.btn-primary:hover:not(:disabled){box-shadow:0 6px 20px rgba(99,102,241,.45);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:rgba(255,255,255,.06);color:#e1e2e9}
.btn-secondary:hover{background:rgba(255,255,255,.12)}
.btn-danger{background:rgba(239,68,68,.1);color:#ef4444}
.btn-danger:hover{background:rgba(239,68,68,.2)}

/* Result area */
.ws-result{margin-top:20px}
.ws-result .result-preview{
  max-width:100%;max-height:300px;border-radius:10px;
  border:1px solid rgba(255,255,255,.06);object-fit:contain;
  background:rgba(0,0,0,.3);
}
.ws-result .result-text{
  padding:16px;background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.05);border-radius:10px;
  font-size:.85rem;color:rgba(255,255,255,.5);max-height:300px;overflow-y:auto;
  white-space:pre-wrap;word-break:break-word;
}

/* Progress */
.ws-progress{display:none;margin:16px 0}
.ws-progress.show{display:block}
.ws-progress .prog-bar{
  height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;
}
.ws-progress .prog-fill{
  height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);
  border-radius:2px;transition:width .3s ease;width:0%;
}
.ws-progress .prog-text{font-size:.75rem;color:rgba(255,255,255,.35);margin-top:6px}

/* Recording UI */
.recording-indicator{display:none;align-items:center;gap:8px;padding:12px 16px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;margin:16px 0}
.recording-indicator.show{display:flex}
.rec-dot{width:10px;height:10px;border-radius:50%;background:#ef4444;animation:pulse-dot .8s infinite}
.rec-timer{font-size:.9rem;font-weight:600;color:#ef4444;font-variant-numeric:tabular-nums}

/* Status badges */
.status-ready{color:#22c55e}
.status-empty{color:rgba(255,255,255,.2)}
.status-wip{color:rgba(255,255,255,.3);font-size:.85rem;line-height:1.7;padding:20px 0}

/* Image crop */
.crop-container{position:relative;max-width:100%;overflow:hidden;margin:16px 0;border-radius:10px;user-select:none}
.crop-container img{display:block;max-width:100%}
.crop-box{position:absolute;border:2px solid #6366f1;box-shadow:0 0 0 9999px rgba(0,0,0,.5);cursor:move}
.crop-handle{position:absolute;width:10px;height:10px;background:#6366f1;border:2px solid #fff;border-radius:2px}
.crop-handle.nw{top:-5px;left:-5px;cursor:nw-resize}
.crop-handle.ne{top:-5px;right:-5px;cursor:ne-resize}
.crop-handle.sw{bottom:-5px;left:-5px;cursor:sw-resize}
.crop-handle.se{bottom:-5px;right:-5px;cursor:se-resize}

/* Audio viz */
.audio-viz{width:100%;height:80px;background:rgba(0,0,0,.3);border-radius:10px;margin:16px 0;overflow:hidden}

.footer{
  border-top:1px solid rgba(255,255,255,.05);background:rgba(10,10,15,.6);
  backdrop-filter:blur(12px);padding:40px 24px 32px;
}
.footer-inner{max-width:1400px;margin:0 auto;display:flex;flex-wrap:wrap;gap:40px;justify-content:space-between}
.footer-brand h4{font-size:1rem;font-weight:700;margin-bottom:8px}
.footer-brand p{font-size:.8rem;color:rgba(255,255,255,.3);max-width:280px;line-height:1.6}
.footer-bottom{max-width:1400px;margin:24px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.04);display:flex;flex-wrap:wrap;gap:12px;justify-content:space-between;font-size:.75rem;color:rgba(255,255,255,.18)}

.no-results{text-align:center;padding:60px 20px;color:rgba(255,255,255,.2)}
.no-results .icon{font-size:3rem;margin-bottom:16px}
.no-results p{font-size:.9rem}
@media(max-width:900px){.main-content{padding:20px 16px 48px}.header{padding:0 16px}}
@media(max-width:600px){.tool-card{padding:14px}.tool-card h3{font-size:.85rem}.search-wrap{max-width:200px}.header-brand{font-size:.95rem}.workspace-panel{width:100vw}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ZIP file tree */
.zip-tree{font-size:.85rem;color:rgba(255,255,255,.6);margin:16px 0;max-height:300px;overflow-y:auto}
.zip-tree .zip-item{padding:4px 8px;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:8px}
.zip-tree .zip-item:hover{background:rgba(99,102,241,.08);color:#e1e2e9}
.zip-tree .zip-folder{color:#818cf8}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="outer-frame">

<header class="header">
  <a class="header-brand" href="#"><span class="logo">M</span>即刻办公</a>
  <span class="header-tagline">一站式在线办公工具箱</span>
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="搜索工具..." autocomplete="off">
    <button class="search-clear" id="searchClear">&times;</button>
  </div>
</header>

<div class="app-layout">
<nav class="sidebar" id="sidebar">
  <div class="sidebar-title">工具分类</div>
  <ul class="sidebar-nav" id="sidebarNav">
    <li><a class="active" data-cat="all">全部工具<span class="sidebar-count">86</span></a></li>
  </ul>
</nav>
<button class="mobile-nav-toggle" id="mobileNavToggle" aria-label="菜单">&#9776;</button>
<main class="main-content" id="mainContent">
  <div class="no-results" id="noResults" style="display:none"><div class="icon">&#128270;</div><p>未找到匹配的工具</p></div>
</main>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand"><h4>即刻办公</h4><p>集成 PDF 处理、格式转换、视频音频工具、图片处理、文档翻译与在线 Office。所有处理在浏览器本地完成，文件即用即焚。</p></div>
  </div>
  <div class="footer-bottom"><span>&copy; 2026 即刻办公. 文件即用即焚，用完自动清理.</span><span>86 款工具，全浏览器端运行</span></div>
</footer>
</div>

<!-- Workspace Panel -->
<div class="workspace-overlay" id="wsOverlay"></div>
<div class="workspace-panel" id="wsPanel">
  <div class="workspace-header">
    <span class="ws-icon" id="wsIcon"></span>
    <h3 id="wsTitle"></h3>
    <button onclick="closeWorkspace()" aria-label="关闭">&times;</button>
  </div>
  <div class="workspace-body" id="wsBody"></div>
</div>

<script>
// ============ TOOL DATA ============
const tools = [
  {id:'pdf-merge',name:'PDF 合并',desc:'将多个 PDF 文档合并为一个文件',icon:'📎',cat:'pdf',badge:'live',formats:['PDF→PDF'],wip:false},
  {id:'pdf-split',name:'PDF 拆分',desc:'分离 PDF 页面或提取特定部分',icon:'✂️',cat:'pdf',formats:['PDF→PDF'],wip:false},
  {id:'pdf-compress',name:'PDF 压缩',desc:'减小 PDF 文件大小，保持质量',icon:'🗜️',cat:'pdf',formats:['PDF→PDF'],wip:true},
  {id:'pdf-edit',name:'PDF 编辑',desc:'在线编辑 PDF 文本和图片',icon:'✏️',cat:'pdf',badge:'hot',formats:['PDF→PDF'],wip:true},
  {id:'pdf-rotate',name:'PDF 旋转',desc:'旋转 PDF 页面方向',icon:'🔄',cat:'pdf',formats:['PDF→PDF'],wip:true},
  {id:'pdf-crop',name:'PDF 裁剪',desc:'裁剪 PDF 页面边距和区域',icon:'✂️',cat:'pdf',formats:['PDF→PDF'],wip:true},
  {id:'pdf-unlock',name:'PDF 解锁',desc:'移除 PDF 密码保护',icon:'🔓',cat:'pdf',formats:['PDF→PDF'],wip:true},

// ============ RENDER TOOLS ============
let currentCategory='all', searchQuery='';

function renderTools(){
  const main = document.getElementById('mainContent');
  const nr = document.getElementById('noResults');
  let filtered = tools.filter(t=>{
    const mc = currentCategory==='all'||t.cat===currentCategory;
    const ms = !searchQuery||t.name.includes(searchQuery)||t.desc.includes(searchQuery);
    return mc&&ms;
  });
  main.querySelectorAll('.category-section').forEach(s=>s.remove());
  if(!filtered.length){nr.style.display='block';return}
  nr.style.display='none';
  if(currentCategory==='all'){
    categories.filter(c=>c.id!=='all').forEach(cat=>{
      const ct = filtered.filter(t=>t.cat===cat.id);
      if(!ct.length) return;
      const s = document.createElement('div');s.className='category-section';s.id='cat-'+cat.id;
      s.innerHTML = `<div class="category-header"><div class="category-icon">${cat.icon}</div><h2>${cat.name}</h2><span class="count">${ct.length} 个工具</span></div><div class="tool-grid">${ct.map(t=>card(t)).join('')}</div>`;
      main.appendChild(s);
    });
  } else {
    const cat = categories.find(c=>c.id===currentCategory);
    const s = document.createElement('div');s.className='category-section';
    s.innerHTML = `<div class="category-header"><div class="category-icon">${cat?.icon||''}</div><h2>${cat?.name||''}</h2><span class="count">${filtered.length} 个工具</span></div><div class="tool-grid">${filtered.map(t=>card(t)).join('')}</div>`;
    main.appendChild(s);
  }
}
function card(t){
  const b=t.badge?`<span class="tool-card-badge badge-${t.badge}">${t.badge==='ai'?'AI':t.badge==='hot'?'热门':t.badge==='new'?'新品':'可用'}</span>`:'';
  return `<div class="tool-card" onclick="openWorkspace('${t.id}')"><span class="live-dot"></span>${b}<div class="tool-card-icon">${t.icon}</div><h3>${t.name}</h3><p>${t.desc}</p></div>`;
}

// ============ WORKSPACE ============
let wsTool=null, wsFiles=[], wsMediaRecorder=null, wsChunks=[], wsTimer=null, wsSeconds=0;
let wsCropData=null, wsAudioBuffer=null, wsAudioCtx=null;

function openWorkspace(id){
  wsTool = tools.find(t=>t.id===id); if(!wsTool) return;
  wsFiles=[]; wsChunks=[]; wsSeconds=0; wsCropData=null; wsAudioBuffer=null;
  if(wsMediaRecorder&&wsMediaRecorder.state!=='inactive'){wsMediaRecorder.stop();wsMediaRecorder=null}
  if(wsTimer) clearInterval(wsTimer);
  if(wsAudioCtx) wsAudioCtx.close(); wsAudioCtx=null;
  document.getElementById('wsIcon').textContent=wsTool.icon;
  document.getElementById('wsTitle').textContent=wsTool.name;
  renderWorkspace();
  document.getElementById('wsOverlay').classList.add('open');
  document.getElementById('wsPanel').classList.add('open');
}
function closeWorkspace(){
  if(wsMediaRecorder&&wsMediaRecorder.state!=='inactive') wsMediaRecorder.stop();
  if(wsTimer) clearInterval(wsTimer);
  if(wsAudioCtx) wsAudioCtx.close(); wsAudioCtx=null;
  document.getElementById('wsOverlay').classList.remove('open');
  document.getElementById('wsPanel').classList.remove('open');
  wsTool=null;
}
document.getElementById('wsOverlay').addEventListener('click',closeWorkspace);
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeWorkspace()});

function renderWorkspace(){
  const b=document.getElementById('wsBody');
  const t=wsTool;
  if(t.wip){
    b.innerHTML=`<div class="status-wip"><p style="font-size:1rem;color:rgba(255,255,255,.5);margin-bottom:12px">此功能需要服务端支持，正在开发中</p><p>${t.desc}</p><p style="margin-top:12px;font-size:.8rem;color:rgba(255,255,255,.2)">参考：${t.ref||'多个工具站'}</p></div>`;
    return;
  }
  let html='';
  const id=t.id;

  // ===== COMMON UPLOAD =====
  const needsUpload = [
    'pdf-merge','pdf-split','pdf-rearrange','pdf-extract-text',
    'word-to-pdf','excel-to-pdf','ppt-to-pdf','jpg-to-pdf','png-to-pdf',
    'conv-img','conv-archive',
    'aud-trim','aud-merge','aud-speed','aud-pitch','aud-reverse','aud-volume',
    'img-compress','img-resize','img-crop','img-rotate','img-flip',
  ].includes(id);

  if(needsUpload){
    const multi = ['pdf-merge','jpg-to-pdf','png-to-pdf','aud-merge'].includes(id);
    const acceptMap = {
      'pdf-merge':'application/pdf','pdf-split':'application/pdf','pdf-rearrange':'application/pdf','pdf-extract-text':'application/pdf',
      'word-to-pdf':'.doc,.docx,application/msword','excel-to-pdf':'.xls,.xlsx','ppt-to-pdf':'.ppt,.pptx',
      'jpg-to-pdf':'image/*','png-to-pdf':'image/*',
      'conv-img':'image/*','conv-archive':'.zip',
      'aud-trim':'audio/*','aud-merge':'audio/*','aud-speed':'audio/*','aud-pitch':'audio/*','aud-reverse':'audio/*','aud-volume':'audio/*',
      'img-compress':'image/*','img-resize':'image/*','img-crop':'image/*','img-rotate':'image/*','img-flip':'image/*',
    };
    const accept = acceptMap[id]||'*/*';
    html += `<div class="upload-zone" id="uploadZone" onclick="document.getElementById('wsFileInput').click()">
      <span class="upload-icon">${multi?'📂':'📤'}</span>
      <div class="upload-text">${multi?'拖拽或点击上传多个文件':'拖拽或点击上传文件'}</div>
      <div class="upload-hint">${accept}</div>
    </div>
    <input type="file" id="wsFileInput" ${multi?'multiple':''} accept="${accept}" style="display:none" onchange="wsAddFiles(this.files)">
    <div class="ws-file-list" id="wsFileList"></div>`;
  }

  // ===== TOOL-SPECIFIC OPTIONS =====
  html += '<div class="ws-options" id="wsOptions"></div>';

  // ===== RESULT AREA =====
  html += '<div class="ws-result" id="wsResult"></div>';

  // ===== PROGRESS =====
  html += '<div class="ws-progress" id="wsProgress"><div class="prog-bar"><div class="prog-fill" id="progFill"></div></div><div class="prog-text" id="progText">处理中...</div></div>';

  // ===== ACTIONS =====
  html += '<div class="ws-actions" style="margin-top:20px" id="wsActions"></div>';

  // ===== RECORDING INDICATOR =====
  html += '<div class="recording-indicator" id="recIndicator"><span class="rec-dot"></span><span class="rec-timer" id="recTimer">00:00</span></div>';

  b.innerHTML = html;

  // Wire upload drag events
  const uz = b.querySelector('#uploadZone');
  if(uz){
    uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('dragover')});
    uz.addEventListener('dragleave',()=>uz.classList.remove('dragover'));
    uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('dragover');wsAddFiles(e.dataTransfer.files)});
  }

  // Render tool-specific config
  setupToolConfig(id);
}

function wsAddFiles(files){
  for(const f of files){
    if(!wsFiles.find(x=>x.name===f.name&&x.size===f.size)) wsFiles.push(f);
  }
  renderFileList();
  if(wsTool.id==='conv-archive'&&wsFiles.length) handleZipExtract();
  if(['aud-trim','aud-merge','aud-speed','aud-pitch','aud-reverse','aud-volume'].includes(wsTool.id)&&wsFiles.length) loadAudioForProcessing();
}

function renderFileList(){
  const el = document.getElementById('wsFileList'); if(!el) return;
  el.innerHTML = wsFiles.map((f,i)=>`<div class="ws-file-item"><span style="font-size:1.1rem">📄</span><span class="fname">${f.name}</span><span class="fsize">${fmtSize(f.size)}</span><button class="fremove" onclick="wsRemoveFile(${i})">&times;</button></div>`).join('');
  updateActionButton();
}

function wsRemoveFile(i){wsFiles.splice(i,1);renderFileList();
  if(wsTool.id==='conv-archive'&&wsFiles.length) handleZipExtract();
}

function fmtSize(bytes){
  if(bytes<1024) return bytes+' B';
  if(bytes<1048576) return (bytes/1024).toFixed(1)+' KB';
  return (bytes/1048576).toFixed(1)+' MB';
}

// ============ PROCESSING ENGINE ============
async function processTool(){
  const id=wsTool.id;
  setProgress(10,'处理中...');
  try{
    switch(id){
      case 'pdf-merge': await pdfMerge(); break;
      case 'pdf-split': await pdfSplit(); break;
      case 'pdf-rearrange': await pdfRearrange(); break;
      case 'pdf-extract-text': await pdfExtractText(); break;
      case 'word-to-pdf':case 'excel-to-pdf':case 'ppt-to-pdf': await officeToPdf(); break;
      case 'jpg-to-pdf':case 'png-to-pdf': await imagesToPdf(); break;
      case 'conv-img': await convertImage(); break;
      case 'img-compress': await compressImage(); break;
      case 'img-resize': await resizeImage(); break;
      case 'img-rotate': await rotateImage(); break;
      case 'img-flip': await flipImage(); break;
      case 'conv-html-pdf': await htmlToPdf(); break;
    }
  }catch(e){
    setProgress(0,'失败：'+e.message);
    document.getElementById('wsResult').innerHTML=`<div style="padding:12px;background:rgba(239,68,68,.08);border-radius:10px;color:#ef4444;font-size:.85rem">${e.message}</div>`;
  }
}

function setProgress(pct,text){
  const p=document.getElementById('wsProgress'); if(!p) return;
  p.classList.add('show');
  document.getElementById('progFill').style.width=pct+'%';
  if(text) document.getElementById('progText').textContent=text;
}

// PDF Merge
async function pdfMerge(){
  const pdfDoc = await PDFLib.PDFDocument.create();
  for(let i=0;i<wsFiles.length;i++){
    setProgress(10+Math.floor(80*i/wsFiles.length),`合并中 ${i+1}/${wsFiles.length}...`);
    const ab = await wsFiles[i].arrayBuffer();
    const src = await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
    const pages = await pdfDoc.copyPages(src,src.getPageIndices());
    pages.forEach(p=>pdfDoc.addPage(p));
  }
  setProgress(90,'生成中...');
  const bytes = await pdfDoc.save();
  downloadBlob(bytes,'merged.pdf','application/pdf');
  setProgress(100,'完成！');
}

// PDF Split
async function pdfSplit(){
  const pagesStr = document.getElementById('optPages')?.value||'';
  const ab = await wsFiles[0].arrayBuffer();
  const src = await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
  const total = src.getPageCount();
  const pages = parsePageRanges(pagesStr,total);
  if(!pages.length){throw new Error('请指定页码范围')}
  setProgress(20,'拆分中...');
  const newDoc = await PDFLib.PDFDocument.create();
  const copied = await newDoc.copyPages(src,pages.map(p=>p-1));
  copied.forEach(p=>newDoc.addPage(p));
  const bytes = await newDoc.save();
  downloadBlob(bytes,'split.pdf','application/pdf');
  setProgress(100,'完成！');
}

// PDF Rearrange
async function pdfRearrange(){
  const orderStr = document.getElementById('optOrder')?.value||'';
  const ab = await wsFiles[0].arrayBuffer();
  const src = await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
  const total = src.getPageCount();
  const order = orderStr.split(',').map(s=>parseInt(s.trim())).filter(n=>n>=1&&n<=total);
  if(!order.length){throw new Error('请指定页面顺序')}
  const newDoc = await PDFLib.PDFDocument.create();
  const copied = await newDoc.copyPages(src,order.map(p=>p-1));
  copied.forEach(p=>newDoc.addPage(p));
  const bytes = await newDoc.save();
  downloadBlob(bytes,'rearranged.pdf','application/pdf');
  setProgress(100,'完成！');
}

// Office to PDF via print
async function officeToPdf(){
  const file = wsFiles[0];
  const url = URL.createObjectURL(file);
  const iframe = document.createElement('iframe');
  iframe.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999';
  iframe.src=url;
  document.body.appendChild(iframe);
  setProgress(50,'加载中，请在弹出的打印对话框中选择"另存为 PDF"...');
  iframe.onload = ()=>{
    setTimeout(()=>{
      iframe.contentWindow.print();
      setProgress(100,'已打开打印对话框');
      setTimeout(()=>document.body.removeChild(iframe),3000);
    },1000);
  };

// Images to PDF
async function imagesToPdf(){
  const pdfDoc = await PDFLib.PDFDocument.create();
  for(let i=0;i<wsFiles.length;i++){
    setProgress(10+Math.floor(80*i/wsFiles.length),`处理图片 ${i+1}/${wsFiles.length}...`);
    const imgBytes = await wsFiles[i].arrayBuffer();
    let img;
    if(wsFiles[i].type==='image/png') img = await pdfDoc.embedPng(imgBytes);
    else img = await pdfDoc.embedJpg(imgBytes);
    const page = pdfDoc.addPage([img.width,img.height]);
    page.drawImage(img,{x:0,y:0,width:img.width,height:img.height});
  }
  const bytes = await pdfDoc.save();
  downloadBlob(bytes,'images.pdf','application/pdf');
  setProgress(100,'完成！');
}

// Image format convert
async function convertImage(){
  const fmt = document.getElementById('optFormat')?.value||'image/jpeg';
  const qual = parseInt(document.getElementById('optQuality')?.value||'85')/100;
  for(let i=0;i<wsFiles.length;i++){
    setProgress(Math.floor(80*(i+1)/wsFiles.length),`转换中 ${i+1}/${wsFiles.length}...`);
    const bmp = await createImageBitmap(wsFiles[i]);
    const c=document.createElement('canvas');c.width=bmp.width;c.height=bmp.height;
    c.getContext('2d').drawImage(bmp,0,0);
    const blob = await new Promise(r=>c.toBlob(r,fmt,qual));
    const ext = fmt==='image/jpeg'?'jpg':fmt==='image/png'?'png':'webp';
    downloadBlob(blob,wsFiles[i].name.replace(/\.[^.]+$/,'.'+ext),fmt);
  }
  setProgress(100,'完成！');
}

// Image compress
async function compressImage(){
  const qual = parseInt(document.getElementById('optQuality')?.value||'75')/100;
  const maxW = parseInt(document.getElementById('optMaxW')?.value||'0');
  for(let i=0;i<wsFiles.length;i++){
    setProgress(Math.floor(80*(i+1)/wsFiles.length),`压缩中 ${i+1}/${wsFiles.length}...`);
    const bmp = await createImageBitmap(wsFiles[i]);
    let w=bmp.width, h=bmp.height;
    if(maxW>0&&w>maxW){h=Math.round(h*maxW/w);w=maxW}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(bmp,0,0,w,h);
    const blob = await new Promise(r=>c.toBlob(r,'image/jpeg',qual));
    downloadBlob(blob,'compressed_'+wsFiles[i].name.replace(/\.[^.]+$/,'.jpg'),'image/jpeg');
  }
  setProgress(100,'完成！');
}

// Image resize
async function resizeImage(){
  const nw = parseInt(document.getElementById('optW')?.value||'800');
  const nh = parseInt(document.getElementById('optH')?.value||'600');
  const keepRatio = document.getElementById('optKeepRatio')?.checked??true;
  const bmp = await createImageBitmap(wsFiles[0]);
  let tw=nw, th=nh;
  if(keepRatio){const r=Math.min(nw/bmp.width,nh/bmp.height);tw=Math.round(bmp.width*r);th=Math.round(bmp.height*r)}
  setProgress(50,'缩放中...');
  const c=document.createElement('canvas');c.width=tw;c.height=th;
  c.getContext('2d').drawImage(bmp,0,0,tw,th);
  const blob = await new Promise(r=>c.toBlob(r,'image/png'));
  downloadBlob(blob,'resized_'+wsFiles[0].name.replace(/\.[^.]+$/,'.png'),'image/png');
  setProgress(100,'完成！');
}

// Image rotate
async function rotateImage(){
  const deg = parseInt(document.getElementById('optRotate')?.value||'90');
  const bmp = await createImageBitmap(wsFiles[0]);
  const swap = deg===90||deg===270;
  const c=document.createElement('canvas');
  c.width=swap?bmp.height:bmp.width;c.height=swap?bmp.width:bmp.height;
  const ctx=c.getContext('2d');
  ctx.translate(c.width/2,c.height/2);ctx.rotate(deg*Math.PI/180);
  ctx.drawImage(bmp,-bmp.width/2,-bmp.height/2);
  const blob = await new Promise(r=>c.toBlob(r,'image/png'));
  downloadBlob(blob,'rotated_'+wsFiles[0].name.replace(/\.[^.]+$/,'.png'),'image/png');
  setProgress(100,'完成！');
}

// Image flip
async function flipImage(){
  const mode = document.getElementById('optFlip')?.value||'horizontal';
  const bmp = await createImageBitmap(wsFiles[0]);
  const c=document.createElement('canvas');c.width=bmp.width;c.height=bmp.height;
  const ctx=c.getContext('2d');
  if(mode==='horizontal'){ctx.translate(c.width,0);ctx.scale(-1,1)}
  else if(mode==='vertical'){ctx.translate(0,c.height);ctx.scale(1,-1)}
  else{ctx.translate(c.width,c.height);ctx.scale(-1,-1)}
  ctx.drawImage(bmp,0,0);
  const blob = await new Promise(r=>c.toBlob(r,'image/png'));
  downloadBlob(blob,'flipped_'+wsFiles[0].name.replace(/\.[^.]+$/,'.png'),'image/png');
  setProgress(100,'完成！');
}

// ZIP extract
async function handleZipExtract(){
  if(!wsFiles.length) return;
  const zip = await JSZip.loadAsync(wsFiles[0]);
  const entries = [];
  zip.forEach((path,file)=>entries.push({path,file,dir:file.dir}));
  let html = '<div class="zip-tree">';

}

// ============ AUDIO PROCESSING ============
async function loadAudioForProcessing(){
  if(!wsFiles.length) return;
  wsAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
  const ab = await wsFiles[0].arrayBuffer();
  wsAudioBuffer = await wsAudioCtx.decodeAudioData(ab);
  // Show preview
  document.getElementById('wsResult').innerHTML = `<div style="font-size:.85rem;color:rgba(255,255,255,.5)">时长：${wsAudioBuffer.duration.toFixed(1)} 秒 · 采样率：${wsAudioBuffer.sampleRate} Hz · 声道：${wsAudioBuffer.numberOfChannels}</div>`;
}

async function processAudio(){
  if(!wsAudioBuffer||!wsAudioCtx) return;
  setProgress(20,'处理中...');
  const id=wsTool.id;
  let buffer = wsAudioBuffer;
  const sr = buffer.sampleRate;
  const ch = buffer.numberOfChannels;

  if(id==='aud-trim'){
    const start = parseFloat(document.getElementById('optStart')?.value||'0');
    const endStr = document.getElementById('optEnd')?.value;
    const end = endStr ? parseFloat(endStr) : buffer.duration;
    const sSample = Math.floor(start*sr);
    const eSample = Math.floor(end*sr);
    const len = eSample - sSample;
    const nb = wsAudioCtx.createBuffer(ch,len,sr);
    for(let c=0;c<ch;c++){
      const srcData = buffer.getChannelData(c);
      const dstData = nb.getChannelData(c);
      for(let i=0;i<len;i++) dstData[i]=srcData[sSample+i]||0;
    }
    buffer=nb;
  } else if(id==='aud-speed'||id==='aud-pitch'){
    const rate = id==='aud-speed' ? (parseInt(document.getElementById('optSpeed')?.value||'100')/100) : 1;
    if(id==='aud-pitch'){
      // Pitch shift via resampling: change sample rate to alter pitch, then play at original rate
      const semitones = parseInt(document.getElementById('optPitch')?.value||'0');
      const pitchRate = Math.pow(2,semitones/12);
      const newLen = Math.floor(buffer.length / pitchRate);
      const nb = wsAudioCtx.createBuffer(ch,newLen,sr);
      for(let c=0;c<ch;c++){
        const src = buffer.getChannelData(c);
        const dst = nb.getChannelData(c);
        for(let i=0;i<newLen;i++) dst[i]=src[Math.floor(i*pitchRate)]||0;
      }
      buffer=nb;
    }
    if(id==='aud-speed'){
      const newLen = Math.floor(buffer.length / rate);
      const nb = wsAudioCtx.createBuffer(ch,newLen,sr);
      for(let c=0;c<ch;c++){
        const src = buffer.getChannelData(c);
        const dst = nb.getChannelData(c);
        for(let i=0;i<newLen;i++) dst[i]=src[Math.floor(i*rate)]||0;
      }
      buffer=nb;
    }
  } else if(id==='aud-reverse'){
    const nb = wsAudioCtx.createBuffer(ch,buffer.length,sr);
    for(let c=0;c<ch;c++){
      const src = buffer.getChannelData(c);
      const dst = nb.getChannelData(c);
      for(let i=0;i<buffer.length;i++) dst[i]=src[buffer.length-1-i];
    }
    buffer=nb;
  } else if(id==='aud-volume'){
    const vol = parseInt(document.getElementById('optVol')?.value||'100')/100;
    const nb = wsAudioCtx.createBuffer(ch,buffer.length,sr);
    for(let c=0;c<ch;c++){
      const src = buffer.getChannelData(c);
      const dst = nb.getChannelData(c);
      for(let i=0;i<buffer.length;i++) dst[i]=Math.max(-1,Math.min(1,src[i]*vol));
    }
    buffer=nb;
  } else if(id==='aud-merge'){
    // Merge multiple audio files
    let totalLen = 0;
    const bufs = [];
    for(const f of wsFiles){
      const ab = await f.arrayBuffer();
      const b = await wsAudioCtx.decodeAudioData(ab);
      bufs.push(b);
      totalLen += b.length;
    }
    const nb = wsAudioCtx.createBuffer(ch,totalLen,sr);
    let offset=0;
    for(const b of bufs){
      for(let c=0;c<ch;c++){
        const src = c<b.numberOfChannels?b.getChannelData(c):new Float32Array(b.length);
        const dst = nb.getChannelData(Math.min(c,ch-1));
        dst.set(src,offset);
      }
      offset+=b.length;
    }
    buffer=nb;
  }

  setProgress(70,'编码中...');
  const wav = audioBufferToWav(buffer);
  const suffix = id==='aud-speed'?'_speed':id==='aud-pitch'?'_pitch':id==='aud-reverse'?'_reverse':id==='aud-volume'?'_volume':id==='aud-trim'?'_trim':'_merged';
  downloadBlob(wav,'output'+suffix+'.wav','audio/wav');
  setProgress(100,'完成！');
}

function audioBufferToWav(buffer){
  const ch = buffer.numberOfChannels;
  const sr = buffer.sampleRate;
  const len = buffer.length;
  const bytesPerSample = 2;
  const blockAlign = ch*bytesPerSample;
  const dataSize = len*blockAlign;
  const buf = new ArrayBuffer(44+dataSize);
  const view = new DataView(buf);
  const writeStr=(off,str)=>{for(let i=0;i<str.length;i++) view.setUint8(off+i,str.charCodeAt(i))};
  writeStr(0,'RIFF');view.setUint32(4,36+dataSize,true);writeStr(8,'WAVE');
  writeStr(12,'fmt ');view.setUint32(16,16,true);view.setUint16(20,1,true);
  view.setUint16(22,ch,true);view.setUint32(24,sr,true);
  view.setUint32(28,sr*blockAlign,true);view.setUint16(32,blockAlign,true);view.setUint16(34,bytesPerSample*8,true);
  writeStr(36,'data');view.setUint32(40,dataSize,true);
  let off=44;
  for(let i=0;i<len;i++){
    for(let c=0;c<ch;c++){
      const s = Math.max(-1,Math.min(1,buffer.getChannelData(c)[i]));
      view.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);
      off+=2;
    }
  }
  return new Blob([buf],{type:'audio/wav'});
}

// ============ RECORDING ============
async function startRecording(){
  const id=wsTool.id;
  if(id==='aud-record'){
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    wsMediaRecorder = new MediaRecorder(stream);
    wsMediaRecorder.ondataavailable = e=>wsChunks.push(e.data);
    wsMediaRecorder.onstop = ()=>{
      const blob = new Blob(wsChunks,{type:'audio/webm'});
      wsChunks=[];
      document.getElementById('wsResult').innerHTML=`<p style="font-size:.85rem;color:#22c55e;margin-bottom:12px">✅ 录音完成</p><button class="btn-primary" onclick="downloadBlob(window._lastRec, 'recording.webm', 'audio/webm')">⬇ 下载录音</button>`;
      window._lastRec=blob;
    };
    wsMediaRecorder.start();
  } else if(id==='vid-screen-record'){
    const stream = await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
    wsMediaRecorder = new MediaRecorder(stream);
    wsMediaRecorder.ondataavailable = e=>wsChunks.push(e.data);
    wsMediaRecorder.onstop = ()=>{
      const blob = new Blob(wsChunks,{type:'video/webm'});
      wsChunks=[];
      document.getElementById('wsResult').innerHTML=`<p style="font-size:.85rem;color:#22c55e;margin-bottom:12px">✅ 录制完成</p><button class="btn-primary" onclick="downloadBlob(window._lastRec, 'screencast.webm', 'video/webm')">⬇ 下载视频</button>`;
      window._lastRec=blob;
    };
    wsMediaRecorder.start();
  }
  document.getElementById('recIndicator').classList.add('show');
  document.getElementById('btnStopRec').style.display='inline-flex';
  wsSeconds=0;
  wsTimer=setInterval(()=>{
    wsSeconds++;
    const m=Math.floor(wsSeconds/60),s=wsSeconds%60;
    document.getElementById('recTimer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },1000);
}

function stopRecording(){
  if(wsMediaRecorder&&wsMediaRecorder.state!=='inactive') wsMediaRecorder.stop();
  if(wsTimer) clearInterval(wsTimer);
  document.getElementById('recIndicator').classList.remove('show');
  document.getElementById('btnStopRec').style.display='none';
}

// Special handling: show crop UI after image loads
const origRenderFileList = renderFileList;
renderFileList = function(){

function showCropUI(){
  const result = document.getElementById('wsResult');
  const file = wsFiles[0];
  const url = URL.createObjectURL(file);
  result.innerHTML = `<div class="crop-container" id="cropContainer"><img src="${url}" id="cropImg" onload="initCrop()"></div>`;
}

function initCrop(){
  const img = document.getElementById('cropImg');
  const container = document.getElementById('cropContainer');
  const w=img.naturalWidth,h=img.naturalHeight;
  const dispW=img.clientWidth,dispH=img.clientHeight;
  const scale=dispW/w;
  const boxW=Math.min(w*0.5*scale,dispW*0.6);
  const boxH=Math.min(h*0.5*scale,dispH*0.6);
  const boxX=(dispW-boxW)/2,boxY=(dispH-boxH)/2;

  const box=document.createElement('div');box.className='crop-box';
  box.style.width=boxW+'px';box.style.height=boxH+'px';box.style.left=boxX+'px';box.style.top=boxY+'px';
  ['nw','ne','sw','se'].forEach(pos=>{
    const h=document.createElement('div');h.className='crop-handle '+pos;box.appendChild(h);
  });
  container.appendChild(box);

  let dragging=false,draggingHandle=null,startX,startY,startLeft,startTop,startW,startH;

  box.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('crop-handle')){
      draggingHandle=e.target.className.split(' ')[1];
    }else{
      draggingHandle=null;
    }
    dragging=true;startX=e.clientX;startY=e.clientY;
    startLeft=parseFloat(box.style.left);startTop=parseFloat(box.style.top);
    startW=parseFloat(box.style.width);startH=parseFloat(box.style.height);
    e.preventDefault();
  });

  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const dx=e.clientX-startX,dy=e.clientY-startY;
    if(draggingHandle==='se'){box.style.width=Math.max(40,startW+dx)+'px';box.style.height=Math.max(40,startH+dy)+'px'}
    else if(draggingHandle==='sw'){box.style.width=Math.max(40,startW-dx)+'px';box.style.left=Math.min(startLeft+dx,startLeft+startW-40)+'px';box.style.height=Math.max(40,startH+dy)+'px'}
    else if(draggingHandle==='ne'){box.style.width=Math.max(40,startW+dx)+'px';box.style.height=Math.max(40,startH-dy)+'px';box.style.top=Math.min(startTop+dy,startTop+startH-40)+'px'}
    else if(draggingHandle==='nw'){box.style.width=Math.max(40,startW-dx)+'px';box.style.left=Math.min(startLeft+dx,startLeft+startW-40)+'px';box.style.height=Math.max(40,startH-dy)+'px';box.style.top=Math.min(startTop+dy,startTop+startH-40)+'px'}
    else{
      let nl=startLeft+dx,nt=startTop+dy;
      nl=Math.max(0,Math.min(nl,dispW-startW));nt=Math.max(0,Math.min(nt,dispH-startH));
      box.style.left=nl+'px';box.style.top=nt+'px';
    }
  });

  document.addEventListener('mouseup',()=>{
    if(dragging){
      dragging=false;
      const scale2=w/dispW;
      wsCropData={
        x:Math.round(parseFloat(box.style.left)*scale2),
        y:Math.round(parseFloat(box.style.top)*scale2),
        w:Math.round(parseFloat(box.style.width)*scale2),
        h:Math.round(parseFloat(box.style.height)*scale2)
      };
    }
  });
}

// ============ UTILS ============
function parsePageRanges(str,total){
  const result=new Set();
  const parts=str.split(',');
  for(const p of parts){
    const trimmed=p.trim();
    if(trimmed.includes('-')){
      const [s,e]=trimmed.split('-').map(n=>parseInt(n.trim()));
      for(let i=s;i<=e;i++){if(i>=1&&i<=total) result.add(i)}
    }else{
      const n=parseInt(trimmed);if(n>=1&&n<=total) result.add(n);
    }
  }
  return [...result].sort((a,b)=>a-b);
}

function downloadBlob(blob,filename,mime){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},200);
}
