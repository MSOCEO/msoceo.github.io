<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08090d"/>
      <stop offset="40%" stop-color="#0a0a15"/>
      <stop offset="100%" stop-color="#11131a"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <radialGradient id="orb1" cx="80%" cy="20%" r="40%">
      <stop offset="0%" stop-color="rgba(99,102,241,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="orb2" cx="20%" cy="80%" r="35%">
      <stop offset="0%" stop-color="rgba(16,185,129,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(139,92,246,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- Star field -->
  <g fill="rgba(255,255,255,0.4)">
    <circle cx="80" cy="60" r="2"/>
    <circle cx="200" cy="120" r="1.5"/>
    <circle cx="350" cy="40" r="2"/>
    <circle cx="500" cy="180" r="1"/>
    <circle cx="650" cy="80" r="2.5"/>
    <circle cx="800" cy="150" r="1.5"/>
    <circle cx="950" cy="60" r="2"/>
    <circle cx="1100" cy="130" r="1"/>
    <circle cx="150" cy="300" r="1.5"/>
    <circle cx="400" cy="350" r="2"/>
    <circle cx="600" cy="400" r="1"/>
    <circle cx="850" cy="300" r="2"/>
    <circle cx="1050" cy="380" r="1.5"/>
    <circle cx="1150" cy="500" r="2"/>
    <circle cx="50" cy="500" r="1.5"/>
    <circle cx="300" cy="550" r="2"/>
    <circle cx="700" cy="520" r="1"/>
    <circle cx="900" cy="560" r="2"/>
    <circle cx="100" cy="200" r="1"/>
    <circle cx="550" cy="250" r="1.5"/>
    <circle cx="750" cy="450" r="2"/>
    <circle cx="250" cy="480" r="1"/>
  </g>

  <!-- Constellation lines -->
  <g stroke="rgba(99,102,241,0.12)" stroke-width="1">
    <line x1="80" y1="60" x2="200" y2="120"/>
    <line x1="200" y1="120" x2="350" y2="40"/>
    <line x1="350" y1="40" x2="500" y2="180"/>
    <line x1="500" y1="180" x2="650" y2="80"/>
    <line x1="650" y1="80" x2="800" y2="150"/>
    <line x1="800" y1="150" x2="950" y2="60"/>
    <line x1="950" y1="60" x2="1100" y2="130"/>
    <line x1="80" y1="60" x2="150" y2="300"/>
    <line x1="200" y1="120" x2="400" y2="350"/>
    <line x1="500" y1="180" x2="600" y2="400"/>
    <line x1="650" y1="80" x2="850" y2="300"/>
    <line x1="950" y1="60" x2="1050" y2="380"/>
    <line x1="150" y1="300" x2="400" y2="350"/>
    <line x1="400" y1="350" x2="600" y2="400"/>
    <line x1="600" y1="400" x2="850" y2="300"/>
    <line x1="850" y1="300" x2="1050" y2="380"/>
    <line x1="1050" y1="380" x2="1150" y2="500"/>
  </g>

  <!-- Orbs -->
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>
  <rect width="1200" height="630" fill="url(#orb3)"/>

  <!-- Title -->
  <text x="600" y="240" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif" font-size="72" font-weight="700" fill="url(#titleGrad)" letter-spacing="-0.02em">
    星迹互联 StarTrails
  </text>

  <!-- Subtitle -->
  <text x="600" y="320" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="28" fill="#9ca3af">
    每一篇博客 都是一颗星
  </text>

  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="20" fill="#6b7280">
    独立博客聚合平台 · 随机穿梭 · 发现同好 · 聚合好文
  </text>

  <!-- Brand star -->
  <text x="600" y="480" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif" font-size="40" fill="rgba(99,102,241,0.5)">✦</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(99,102,241,0.08)"/>
  <line x1="0" y1="600" x2="1200" y2="600" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
</svg>