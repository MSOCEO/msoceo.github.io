<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寒影拾光</title>
  <meta name="description" content="在深夜书房里，拾取散落的光">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root {
      --bg-deep: #020208;
      --bg-stars: #0a0a2e;
      --text: #e8e4f0;
      --accent: #b48cff;
      --muted: rgba(255,255,255,0.35);
      --card-bg: rgba(20,18,30,0.65);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: "PingFang SC", "Noto Sans SC", "Hiragino Sans GB", system-ui;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 星空 Canvas ===== */
    #starry-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== Hero 整屏 ===== */
    .hero {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .hero-title {
      font-size: clamp(3.5rem, 10vw, 6.5rem);
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #fff;
      position: relative;
      text-shadow: 0 0 60px rgba(180,140,255,0.35), 0 0 120px rgba(140,100,220,0.2);
    }

    .hero-title .accent {
      color: var(--accent);
      text-shadow: 0 0 80px rgba(180,140,255,0.5), 0 0 160px rgba(140,100,220,0.3);
    }

    .hero-sub {
      margin-top: 1.2rem;
      font-size: 1.15rem;
      color: var(--muted);
      letter-spacing: 0.35em;
      opacity: 0;
      animation: fadeUp 1.2s 0.6s ease-out forwards;
    }

    .hero-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 2rem auto;
      opacity: 0;
      animation: fadeUp 1s 1s ease-out forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== 下滑指示 ===== */
    .scroll-hint {
      position: absolute;
      bottom: 3rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      opacity: 0;
      animation: fadeUp 1s 1.4s ease-out forwards;
    }

    .scroll-hint .arrow {
      width: 24px;
      height: 24px;
      border-right: 2px solid var(--accent);
      border-bottom: 2px solid var(--accent);
      transform: rotate(45deg);
      animation: bounceDown 2s infinite;
    }

    @keyframes bounceDown {
      0%, 100% { transform: rotate(45deg) translateY(0); opacity: 0.6; }
      50%      { transform: rotate(45deg) translateY(8px); opacity: 1; }
    }

    /* ===== 内容区 ===== */
    .content-section {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 6rem 2rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .section-label {
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      margin-bottom: 3rem;
      text-align: center;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
      max-width: 900px;
      width: 100%;
      margin-bottom: 4rem;
    }

    .card {
      text-decoration: none;
      color: var(--text);
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(180,140,255,0.25);
      box-shadow: 0 12px 40px rgba(100,60,180,0.15);
    }

    .card:hover::before { opacity: 1; }

    .card-icon {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    .card h3 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .card p {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .card.primary {
      background: rgba(180,140,255,0.08);
      border-color: rgba(180,140,255,0.2);
    }

    .card.primary:hover {
      background: rgba(180,140,255,0.14);
      box-shadow: 0 12px 40px rgba(140,100,220,0.2);
    }

    /* ===== Footer ===== */
    .site-footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2rem;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 640px) {
      .hero-title { font-size: clamp(2.5rem, 12vw, 3.5rem); }
      .hero-sub { font-size: 0.9rem; letter-spacing: 0.2em; }
      .card-grid { grid-template-columns: 1fr; }
      .content-section { padding: 4rem 1.25rem 2rem; }
    }
  </style>
</head>
<body>

  <!-- 星空 Canvas -->


  <!-- 内容区 -->
  <section class="content-section" id="content">
    <p class="section-label">— 探索 —</p>
    <h1 style="text-align:center;font-size:2rem;color:#fff;padding:4rem 0 1rem;letter-spacing:0.1em;">寒影·拾光</h1>
    <div class="card-grid">
      <a href="/blog/" class="card primary">
        <div class="card-icon">📖</div>
        <h3>进入博客</h3>
        <p>阅读技术、设计和生活感悟</p>
      </a>
      <a href="/blog/about" class="card">
        <div class="card-icon">✨</div>
        <h3>关于我</h3>
        <p>了解作者与技术栈</p>
      </a>
      <a href="/blog/archive" class="card">
        <div class="card-icon">📚</div>
        <h3>文章归档</h3>
        <p>按时间线浏览所有文章</p>
      </a>
      <a href="/agent-hub/" class="card primary">
        <div class="card-icon">🤖</div>
        <h3>Agent Hub</h3>
        <p>AI 聚合控制台 · LLM/文生图/图生UI 一站式</p>
      </a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    寒影拾光 &copy; 2026 · 在星空下书写
  </footer>


</body>
</html>
