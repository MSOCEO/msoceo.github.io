<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寒影</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0d0d0d;--text:#e0e0e0;--accent:#6b8c7c;--sub:#888;--muted:#555}
    body{
      background:var(--bg);color:var(--text);
      font-family:"Noto Serif SC","Source Han Serif SC",Georgia,serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:2rem;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse at 50% 0%,rgba(107,140,124,.08),transparent 60%);
      pointer-events:none;z-index:0;
    }
    .noise{position:fixed;inset:0;opacity:.03;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
    main{position:relative;z-index:1;text-align:center;max-width:520px}
    h1{font-size:clamp(3rem,8vw,5rem);font-weight:700;letter-spacing:.12em;margin-bottom:.5rem}
    h1 span{color:var(--accent)}
    .subtitle{font-size:1.1rem;color:var(--sub);letter-spacing:.25em;margin-bottom:2.5rem}
    .divider{width:60px;height:1px;background:var(--muted);margin:0 auto 2.5rem}
    .links{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap}
    .links a{
      color:var(--text);text-decoration:none;
      padding:.6rem 1.8rem;border:1px solid var(--muted);
      border-radius:2rem;font-size:.95rem;letter-spacing:.06em;
      transition:all .3s;
    }
    .links a:hover{border-color:var(--accent);color:var(--accent);background:rgba(107,140,124,.06)}
    .links a.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
    .links a.primary:hover{background:transparent;color:var(--accent)}
    footer{position:fixed;bottom:1.5rem;z-index:1;font-size:.8rem;color:var(--muted);letter-spacing:.08em}
  </style>
</head>
<body>
  <div class="noise"></div>
  <main>
    <h1><span>寒</span>影</h1>
    <p class="subtitle">一纸墨痕，半窗寒影</p>
    <div class="divider"></div>
    <div class="links">
      <a href="/blog/" class="primary">进入博客</a>
      <a href="/blog/about">关于</a>
      <a href="/blog/archive">归档</a>
    </div>
  </main>
  <footer>HanYing &copy; 2026</footer>
</body>
</html>
