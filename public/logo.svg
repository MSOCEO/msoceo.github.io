<svg width="200" height="80" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 左侧图标：深蓝圆角方形底 + 白色菱形星迹符号 -->
  <rect x="30" y="20" width="40" height="40" rx="8" fill="#0030B8"/>
  <!-- 白色菱形 -->
  <polygon points="50,26 60,36 50,46 40,36" fill="white"/>
  <!-- 外围四条短线（上下左右） -->
  <line x1="50" y1="22" x2="50" y2="25" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="47" x2="50" y2="50" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="36" x2="35" y2="36" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="62" y1="36" x2="65" y2="36" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- 右侧文字 -->
  <text x="82" y="52" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700" fill="#0030B8" letter-spacing="0.06em">寒影</text>
  <!-- 竖线分隔 -->
  <line x1="155" y1="28" x2="155" y2="56" stroke="#0030B8" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- 小字"星迹" -->
  <text x="163" y="52" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="700" fill="#ED628C" letter-spacing="0.04em">星迹</text>
</svg>
