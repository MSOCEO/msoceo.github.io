<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0;url=https://msoceo.pages.dev/" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>跳转中 — 叙溯 Xusu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0f0f0f; color: #e0e0e0; }
    .box { text-align: center; padding: 3rem; background: #1a1a1a; border-radius: 16px; border: 1px solid #333; max-width: 480px; width: 90%; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #fff; }
    p { color: #888; margin-bottom: 1.5rem; line-height: 1.6; }
    a { color: #60a5fa; text-decoration: none; }
    .loader { display: inline-block; width: 24px; height: 24px; border: 2px solid #333; border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.6s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="loader"></div>
    <h1>正在跳转…</h1>
    <p>即将前往 <a href="https://msoceo.pages.dev/">msoceo.pages.dev</a></p>
    <p style="font-size:0.85rem; color:#555">如未自动跳转，请点击上方链接</p>
  </div>
  <script>location.replace("https://msoceo.pages.dev/")</script>
</body>
</html>
